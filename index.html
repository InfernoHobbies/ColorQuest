// Attach auth headers - uses Supabase JWT if available, falls back to anon key
function sbH(extra){

    "Content-Type":"application/json",

}

// Exchange Google access token for a Supabase JWT (signs user into Supabase Auth)
async function sbSignIn(googleToken){
  try{
    const r=await fetch(SB_URL+"/auth/v1/token?grant_type=id_token",{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":SB_KEY},
      // Supabase accepts Google access tokens via the OpenID provider flow
      body:JSON.stringify({provider:"google",id_token:googleToken})
    });
    // Fallback: if id_token flow fails (access token vs id token), use anon key only
    // and store email as user_id directly — RLS policy uses email match
    if(!r.ok){
      // Use Google email as user_id with anon key — works with permissive RLS
      return {ok:false};
    }
    const j=await r.json();
    if(j.access_token){_sbJwt=j.access_token;return{ok:true,jwt:j.access_token};}
    return{ok:false};
  }catch(e){return{ok:false};}
}

// ── Supabase Storage: photo upload ───────────────────────────────────────────
async function compressImage(file,maxPx=1200,quality=0.82){
  return new Promise(res=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const scale=Math.min(1,maxPx/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      c.toBlob(b=>res(b),"image/jpeg",quality);
    };
    img.src=url;
  });
}

  }catch(e){console.error("Upload error",e);return null;}
}

function sbSubscribeProfiles(onUpdate){
  // Supabase realtime over WebSocket
  const ws=new WebSocket(SB_URL.replace("https","wss")+"/realtime/v1/websocket?apikey="+SB_KEY+"&vsn=1.0.0");
  let hbInterval=null;
  ws.onopen=()=>{
    ws.send(JSON.stringify({topic:"realtime:public:tr_public_profiles",event:"phx_join",payload:{},ref:"1"}));
    hbInterval=setInterval(()=>ws.send(JSON.stringify({topic:"phoenix",event:"heartbeat",payload:{},ref:"hb"})),25000);
  };
  ws.onmessage=e=>{
    try{
      const msg=JSON.parse(e.data);
      if(msg.event==="INSERT"||msg.event==="UPDATE"||msg.event==="DELETE"){
        onUpdate(msg.payload);
      }
    }catch(err){}
  };
  ws.onerror=()=>{};
  return()=>{clearInterval(hbInterval);try{ws.close();}catch(e){}};
}

function useAuth(){
  const [sess,setSess]=useState(undefined);

  useEffect(()=>{
    const hash=window.location.hash;
    if(hash&&hash.includes("access_token")){
      const params=new URLSearchParams(hash.replace("#","?"));
      const accessToken=params.get("access_token");
      const expiresIn=parseInt(params.get("expires_in")||"3600");
      if(accessToken){
        const email=jwtEmail(accessToken);
        if(email){
          _sbJwt=accessToken;
          const exp=Date.now()+expiresIn*1000-60000;
          lsSet(TKEY,{token:accessToken,email,expiresAt:exp,sbJwt:accessToken});
          setSess({token:accessToken,email});
          sbSetEmail(email);
          window.history.replaceState(null,"",window.location.pathname+window.location.search);
          return;
        }
      }
    }
    const s=lsGet(TKEY,null);
    if(s&&s.expiresAt>Date.now()){
      if(s.sbJwt){_sbJwt=s.sbJwt;}
      setSess({token:s.token,email:s.email});
    } else{lsSet(TKEY,null);setSess(null);}
  },[]);

  useEffect(()=>{
    const t=setInterval(()=>{
      const s=lsGet(TKEY,null);
      if(s&&s.expiresAt&&s.expiresAt<Date.now()){lsSet(TKEY,null);_sbJwt=null;setSess(null);}
    },30000);
    return()=>clearInterval(t);
  },[]);

  const signIn=useCallback(()=>{
    const redirectTo=encodeURIComponent(window.location.origin+"/");
    window.location.href=SB_URL+"/auth/v1/authorize?provider=google&redirect_to="+redirectTo;
  },[]);

  const signOut=useCallback(()=>{
    lsSet(TKEY,null);_sbJwt=null;setSess(null);
  },[]);

  return{sess,signIn,signOut};
}

function MultiPhoto({photos,onChange,sess,projectId,unitId}){

function SplitModal({unit,onSave,onClose}){
  const [countStr,setCountStr]=useState(String(Math.floor(unit.models/2)));
  const [stat,setStat]=useState("built");
  const count=parseInt(countStr)||0;
  const rem=unit.models-count;
  const valid=count>=1&&count<unit.models;
  function save(){
    if(!valid)return;
    // Replace subgroups entirely with a fresh split - cleaner than appending
    const sgs=[{id:nid(),models:count,status:stat},{id:nid(),models:rem,status:unit.status}];
    onSave({...unit,subgroups:sgs});
    onClose();
  }
  return <Modal title={"Split: "+unit.name} onClose={onClose}>
    <div style={{background:T.bg2,borderRadius:10,padding:"12px",marginBottom:14,fontSize:13,color:T.text2,lineHeight:1.6}}>
      Split this unit into two groups with different statuses — e.g. 3 Painted and 7 Built.
    </div>
    <Field label={"Models in first group (of "+unit.models+")"}>
      <input
        type="number" min={1} max={unit.models-1}
        value={countStr}
        onChange={e=>setCountStr(e.target.value)}
        onBlur={e=>{const v=parseInt(e.target.value);if(!v||v<1)setCountStr("1");else if(v>=unit.models)setCountStr(String(unit.models-1));else setCountStr(String(v));}}
        style={{...IS,fontSize:16}}
      />
    </Field>
    <Sel label="Status for first group" value={stat} onChange={e=>setStat(e.target.value)}>
      {Object.entries(SC).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
    </Sel>
    <div style={{background:T.bg2,borderRadius:10,padding:"10px 12px",marginBottom:14,fontSize:13}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:T.text2}}>Group 1:</span><span style={{fontWeight:700,color:SC[stat]?SC[stat].color:T.text}}>{valid?count:"?"}x {SC[stat]?SC[stat].label:stat}</span></div>
      <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:T.text2}}>Group 2:</span><span style={{fontWeight:700,color:SC[unit.status]?SC[unit.status].color:T.text}}>{valid?rem:"?"}x {SC[unit.status]?SC[unit.status].label:unit.status}</span></div>
    </div>
    {!valid&&<div style={{fontSize:12,color:T.red,marginBottom:12}}>Enter a number between 1 and {unit.models-1}.</div>}
    <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn v="sec" sm onClick={onClose}>Cancel</Btn><Btn sm onClick={save} disabled={!valid} sx={{opacity:valid?1:0.4}}>Split</Btn></div>
  </Modal>;
}

function Donut({stats,size=110}){
  const r=44,cx=60,cy=60,circ=2*Math.PI*r;
  if(!stats||!stats.total)return <div style={{width:size,height:size,borderRadius:"50%",background:T.bg2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:T.text3}}>Empty</div>;
  let off=0;
  const slices=Object.entries(SC).filter(([k])=>stats[k]>0).map(([k,c])=>{const d=stats[k]/stats.total*circ;const s={key:k,color:c.color,dash:d,off};off+=d;return s;});
  return <svg width={size} height={size} viewBox="0 0 120 120"><circle cx={cx} cy={cy} r={r} fill="none" stroke={T.bg2} strokeWidth="16"/>{slices.map(s=><circle key={s.key} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth="16" strokeDasharray={s.dash+" "+(circ-s.dash)} strokeDashoffset={-s.off+circ/4}/>)}<text x={cx} y={cy-5} textAnchor="middle" fill={T.text} fontSize="18" fontWeight="900" fontFamily="inherit">{stats.total}</text><text x={cx} y={cy+12} textAnchor="middle" fill={T.text3} fontSize="9" fontFamily="inherit" letterSpacing="0.1em">MODELS</text></svg>;
}

function ActivityChart({log}){
  const months=useMemo(()=>{const now=new Date();const counts={};const order=[];for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);const key=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");counts[key]=0;order.push({key,label:MONTHS[d.getMonth()]});}log.filter(e=>e.toStatus==="painted").forEach(e=>{const k=e.date.slice(0,7);if(counts[k]!==undefined)counts[k]+=e.count;});return order.map(({key,label})=>({label,count:counts[key]}));},[log]);
  const max=Math.max(...months.map(m=>m.count),1);
  return <div style={{background:T.bg1,border:"1px solid "+T.border,borderRadius:14,padding:"16px 18px",marginBottom:14}}>
    <div style={{fontSize:11,color:T.text3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12,fontWeight:600}}>Models Painted - Last 6 Months</div>
    <div style={{display:"flex",gap:6,alignItems:"flex-end",height:60}}>{months.map(({label,count})=><div key={label} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{fontSize:10,color:T.text3,fontWeight:700}}>{count||""}</div><div style={{width:"100%",background:count>0?T.accent:T.bg2,borderRadius:4,height:Math.max(4,(count/max)*44)+"px",transition:"height 0.4s"}}/><div style={{fontSize:10,color:T.text3}}>{label}</div></div>)}</div>
    {months.every(m=>m.count===0)&&<div style={{textAlign:"center",fontSize:12,color:T.text3,marginTop:8}}>Update unit statuses to track progress!</div>}
  </div>;
}

function HobbyBlocker({data,onGoTo}){
  const [pick,setPick]=useState(()=>lsGet(SK.hobby,null));
  const today=new Date().toISOString().slice(0,10);
  useEffect(()=>{if(pick&&pick.date===today&&data.projects.some(p=>p.id===pick.projectId))return;const cands=data.projects.filter(p=>{const s=getStats(p);return s.total>0&&s.painted<s.total;});if(cands.length){const c=cands[Math.floor(Math.random()*cands.length)];const np={date:today,projectId:c.id};lsSet(SK.hobby,np);setPick(np);}},[data.projects.length]);
  function reroll(){const cur=pick?pick.projectId:null;const cands=data.projects.filter(p=>{const s=getStats(p);return s.total>0&&s.painted<s.total&&p.id!==cur;});if(!cands.length)return;const c=cands[Math.floor(Math.random()*cands.length)];const np={date:today,projectId:c.id};lsSet(SK.hobby,np);setPick(np);}
  const proj=pick?data.projects.find(p=>p.id===pick.projectId):null;

function Following({onClose,sess}){
  const [tab,setTab]=useState("following");
  const [followingList,setFollowingList]=useState([]);
  const [followerList,setFollowerList]=useState([]);
  const [liveData,setLiveData]=useState({});
  const [addEmail,setAddEmail]=useState("");
  const [addErr,setAddErr]=useState("");
  const [viewing,setViewing]=useState(null);
  const [loading,setLoading]=useState(true);
  const [busy,setBusy]=useState(false);

  const myEmail=sess&&sess.email;

  // Load follow relationships from Supabase
  async function loadFollows(){
    if(!myEmail)return;
    setLoading(true);
    const {following,followers}=await sbGetFollows(myEmail);
    setFollowingList(following);
    setFollowerList(followers);
    // Load profiles for all
    const allEmails=[...new Set([...following,...followers])];
    if(allEmails.length){
      const profiles=await sbGetProfiles(allEmails);
      const map={};profiles.forEach(p=>{map[p.user_id]=p;});
      setLiveData(map);
    }
    setLoading(false);
  }

  useEffect(()=>{loadFollows();},[myEmail]);

  // Realtime subscription
  useEffect(()=>{
    const allEmails=new Set([...followingList,...followerList]);
    if(!allEmails.size)return;
    const unsub=sbSubscribeProfiles(payload=>{
      const row=payload.record||payload.new;
      if(row&&allEmails.has(row.user_id)){setLiveData(d=>({...d,[row.user_id]:row}));}
    });
    return unsub;
  },[followingList,followerList]);

  function initials(name){if(!name)return"?";return name.trim().split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);}
  function acolor(name){const cols=[T.accent,T.blue,T.green,T.orange,T.yellow];return name?cols[name.charCodeAt(0)%cols.length]:T.text3;}

  async function addFollow(){
    if(!myEmail){setAddErr("Sign in to follow people.");return;}
    const raw=addEmail.trim().toLowerCase();
    if(!raw){setAddErr("Enter an email address.");return;}
    if(!raw.includes("@")){setAddErr("Enter the email address they use to sign in.");return;}
    if(raw===myEmail){setAddErr("You can't follow yourself.");return;}
    if(followingList.includes(raw)){setAddErr("Already following that person.");return;}
    setAddErr("");setBusy(true);
    const exists=await sbUserExists(raw);
    if(!exists){setBusy(false);setAddErr("No Tabletop Ready account found for that email. Make sure they have signed in at least once.");return;}
    const ok=await sbFollow(myEmail,raw);
    if(ok){
      setFollowingList(f=>[...f,raw]);
      // Load their profile in background
      sbGetProfile(raw).then(profile=>{if(profile)setLiveData(d=>({...d,[raw]:profile}));});
      setAddEmail("");
    } else {setAddErr("Could not follow — try again.");}
    setBusy(false);
  }

  async function removeFollow(email){
    if(!myEmail)return;
    await sbUnfollow(myEmail,email);
    setFollowingList(f=>f.filter(e=>e!==email));
  }

  async function followBack(email){
    if(!myEmail)return;
    setBusy(true);
    const ok=await sbFollow(myEmail,email);
    if(ok)setFollowingList(f=>[...f,email]);
    setBusy(false);
  }

  async function blockFollower(email){
    if(!myEmail)return;
    if(!window.confirm("Block "+email+"? They won't be able to see your profile."))return;
    await sbBlockFollower(myEmail,email);
    setFollowerList(f=>f.filter(e=>e!==email));
  }

  async function openProfile(email){
    // Load full project data for this user
    const profile=liveData[email];
    const name=(profile&&profile.display_name)||email.split("@")[0];
    setViewing({email,name,loading:true,projects:null,profile});
    const projects=await sbLoadUserData(email);
    setViewing(v=>v&&v.email===email?{...v,loading:false,projects}:v);
  }

  // ── Profile viewer ──────────────────────────────────────────────────────────
  if(viewing){
    const {email,name,loading:vloading,projects,profile}=viewing;
    const col=acolor(name);
    const pjs=projects||[];

      const map={};

        if(!s.paint)return;
        const key=(s.brand||"")+s.paint;
        if(!map[key])map[key]={name:s.paint,brand:s.brand||"",type:s.type||"",projects:new Set()};
        map[key].projects.add(p.name);
      })));
      return Object.values(map).map(e=>({...e,projects:[...e.projects]})).sort((a,b)=>(a.brand+a.name).localeCompare(b.brand+b.name));
    },[projects]):[];

    const [vtab,setVtab]=useState("projects");
    const [vpidx,setVpidx]=useState(null);

    // Project detail view
    if(vpidx!==null){
      const p=pjs[vpidx];

      return <div style={{minHeight:"100dvh",background:T.bg0,fontFamily:"inherit",color:T.text}}>

          <button onClick={()=>setVpidx(null)} style={{background:"none",border:"none",color:T.text2,cursor:"pointer",width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:10}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:11,color:T.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>{name}</div><div style={{fontWeight:700,fontSize:16,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}{p.faction&&<span style={{fontWeight:400,color:T.text3,fontSize:13}}> · {p.faction}</span>}</div></div>

          {vtab==="showcase"&&<div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{shots.map(({img,lbl,u},i)=><div key={i} style={{borderRadius:14,overflow:"hidden",position:"relative"}}><img src={img} alt={u.name} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}}/><div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.75))",padding:"20px 10px 8px"}}><div style={{fontSize:12,fontWeight:800,color:"#fff"}}>{u.name}</div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:3}}><Badge status={u.status}/><span style={{fontSize:10,color:"rgba(255,255,255,0.7)",background:"rgba(0,0,0,0.4)",borderRadius:4,padding:"2px 5px"}}>{lbl}</span></div></div></div>)}</div>{shots.length===0&&<div style={{textAlign:"center",color:T.text3,padding:"40px 0",fontSize:13}}>No photos yet.</div>}</div>}
        </div>
      </div>;
    }

    // Profile overview
    const g={new_in_box:0,unbuilt:0,built:0,painted:0,total:0};
    pjs.forEach(p=>{const s=getStats(p);Object.keys(g).forEach(k=>g[k]+=(s[k]||0));});
    const pct=g.total?Math.round(g.painted/g.total*100):0;

    return <div style={{minHeight:"100dvh",background:T.bg0,fontFamily:"inherit",color:T.text,display:"flex",flexDirection:"column"}}>
      <div style={{borderBottom:"1px solid "+T.border,padding:"calc(14px + env(safe-area-inset-top)) 15px 13px",display:"flex",alignItems:"center",gap:10,background:T.bg1,position:"sticky",top:0,zIndex:50}}>
        <button onClick={()=>setViewing(null)} style={{background:"none",border:"none",color:T.text2,cursor:"pointer",width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:10}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div style={{flex:1}}><div style={{fontSize:11,fontWeight:800,color:T.text3,letterSpacing:"0.10em",textTransform:"uppercase"}}>TABLETOP READY</div><h1 style={{margin:0,fontSize:16,fontWeight:800,color:T.text}}>{name}</h1></div>
        {!isFollowing&&<Btn sm onClick={()=>followBack(email)} sx={{opacity:busy?0.6:1}}>{busy?"...":"+ Follow"}</Btn>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 15px 40px",maxWidth:680,margin:"0 auto",width:"100%"}}>
        {/* Profile header */}
        <div style={{background:"#fff",borderRadius:18,padding:"18px",marginBottom:14,boxShadow:T.shadow,display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:56,height:56,borderRadius:"50%",background:col+"18",border:"2px solid "+col+"30",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:800,color:col,flexShrink:0}}>{initials(name)}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:17,fontWeight:800,color:T.text}}>{name}</div>
            <div style={{fontSize:13,color:T.text3,marginTop:2}}>{pjs.length} project{pjs.length!==1?"s":""} · {g.total} models · {pct}% painted</div>
            <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
              {isFollowing&&<span style={{fontSize:12,background:T.green+"14",color:T.green,borderRadius:20,padding:"3px 10px",fontWeight:700}}>✓ Following</span>}
              {isFollower&&!isFollowing&&<Btn sm v="ok" onClick={()=>followBack(email)} sx={{opacity:busy?0.6:1}}>{busy?"...":"Follow back"}</Btn>}
              {isFollower&&<span style={{fontSize:12,background:T.blue+"14",color:T.blue,borderRadius:20,padding:"3px 10px",fontWeight:700}}>Follows you</span>}
            </div>
          </div>
        </div>
        {vloading&&<div style={{textAlign:"center",padding:"40px 0",color:T.text3,fontSize:13}}>Loading projects...</div>}
        {!vloading&&<>
          <TabBar tabs={[{id:"projects",label:"Projects ("+pjs.length+")"},{id:"paints",label:"Paint List ("+paintNeeded.length+")"}]} active={vtab==="projects"||vtab==="paints"?vtab:"projects"} onChange={t=>setVtab(t)}/>
          {(vtab==="projects"||vtab!=="paints")&&<>
            {pjs.length===0&&<div style={{textAlign:"center",color:T.text3,padding:"40px 0",fontSize:13}}>No projects yet.</div>}
            {pjs.map((p,i)=>{const s=getStats(p);const pct2=s.total?Math.round(s.painted/s.total*100):0;
              // Find photos from units
              const photos=p.units.flatMap(u=>{const ph=safeP(u);return[ph.after,ph.wip,ph.before].filter(Boolean);}).slice(0,3);
              return <div key={i} onClick={()=>{setVtab("units");setVpidx(i);}} style={{background:"#fff",borderRadius:18,padding:"16px 18px",marginBottom:10,cursor:"pointer",boxShadow:T.shadow}}>
                {photos.length>0&&<div style={{display:"flex",gap:6,marginBottom:10}}>{photos.map((img,j)=><img key={j} src={img} alt="" style={{width:56,height:56,objectFit:"cover",borderRadius:10,display:"block"}}/>)}</div>}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontWeight:700,fontSize:15,color:T.text}}>{p.name}</div>{p.faction&&<div style={{fontSize:13,color:T.text3,marginTop:2}}>{p.faction}</div>}</div><div style={{textAlign:"right"}}><div style={{fontWeight:700,color:T.green,fontSize:18}}>{pct2}%</div><div style={{fontSize:11,color:T.text3}}>{s.total} models</div></div></div>
                <Bar stats={s}/>
                <div style={{fontSize:12,color:T.text3,marginTop:4}}>{p.units.length} units · {(p.recipes||[]).length} recipes · tap to view</div>
              </div>;})}
          </>}
          {vtab==="paints"&&<>
            {paintNeeded.length===0&&<div style={{textAlign:"center",color:T.text3,padding:"40px 0",fontSize:13}}><div style={{fontSize:32,marginBottom:8}}>🎨</div>No paint recipes yet.</div>}
            {paintNeeded.map((p,i)=><div key={i} style={{background:"#fff",borderRadius:12,padding:"12px 16px",marginBottom:8,boxShadow:T.shadow,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div><div style={{fontSize:14,fontWeight:700,color:T.text}}>{p.name}</div>{(p.brand||p.type)&&<div style={{fontSize:12,color:T.text3,marginTop:1}}>{[p.brand,p.type].filter(Boolean).join(" · ")}</div>}</div>
              <div style={{fontSize:11,color:T.text3,textAlign:"right",flexShrink:0,maxWidth:120}}>{p.projects.slice(0,2).join(", ")}{p.projects.length>2?" +more":""}</div>
            </div>)}
          </>}
        </>}
      </div>
    </div>;
  }

  // ── Main Following screen ───────────────────────────────────────────────────
  const activeTab=tab;
  const displayList=activeTab==="following"?followingList:followerList;

  return <div style={{minHeight:"100dvh",background:T.bg0,fontFamily:"inherit",display:"flex",flexDirection:"column"}}>
    <div style={{borderBottom:"1px solid "+T.border,padding:"calc(14px + env(safe-area-inset-top)) 15px 13px",display:"flex",alignItems:"center",gap:10,background:"#fff",position:"sticky",top:0,zIndex:50}}>
      <button onClick={onClose} style={{background:"none",border:"none",color:T.text2,cursor:"pointer",fontSize:20,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:10}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div style={{flex:1}}><div style={{fontSize:11,fontWeight:800,color:T.text3,letterSpacing:"0.10em",textTransform:"uppercase"}}>TABLETOP READY</div><h1 style={{margin:0,fontSize:16,fontWeight:800,color:T.text}}>Community</h1></div>
      <button onClick={loadFollows} style={{background:"none",border:"1px solid "+T.border,borderRadius:8,padding:"5px 12px",fontSize:12,color:T.text2,cursor:"pointer",fontFamily:"inherit"}}>{loading?"...":"Refresh"}</button>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"12px 15px 40px",maxWidth:680,margin:"0 auto",width:"100%"}}>
      {/* Tab bar */}
      <div style={{display:"flex",gap:3,background:T.bg2,borderRadius:14,padding:4,marginBottom:16}}>
        {[{id:"following",label:"Following ("+followingList.length+")"},{id:"followers",label:"Followers ("+followerList.length+")"}].map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"9px 8px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:tab===t.id?700:500,fontSize:13,fontFamily:"inherit",background:tab===t.id?"#fff":"transparent",color:tab===t.id?T.text:T.text3,boxShadow:tab===t.id?T.shadow:"none",transition:"all 0.15s"}}>{t.label}</button>)}
      </div>

      {/* Add follow input (following tab only) */}
      {tab==="following"&&<div style={{background:"#fff",borderRadius:18,padding:"16px",marginBottom:14,boxShadow:T.shadow}}>
        <div style={{fontSize:12,color:T.text3,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>Follow someone</div>
        <div style={{display:"flex",gap:8}}>
          <input value={addEmail} onChange={e=>{setAddEmail(e.target.value);setAddErr("");}} placeholder="Their email address..." style={{...IS,flex:1,fontSize:14}} onKeyDown={e=>e.key==="Enter"&&addFollow()}/>
          <Btn sm onClick={addFollow} sx={{flexShrink:0,height:42,opacity:busy?0.6:1}}>{busy?"...":"Follow"}</Btn>
        </div>
        {addErr&&<div style={{fontSize:13,color:T.red,marginTop:8}}>{addErr}</div>}
      </div>}

      {/* List */}
      {loading&&<div style={{textAlign:"center",padding:"40px 0",color:T.text3,fontSize:13}}>Loading...</div>}
      {!loading&&displayList.length===0&&<div style={{textAlign:"center",padding:"60px 20px",color:T.text3}}>
        <div style={{fontSize:40,marginBottom:16}}>{tab==="following"?"👥":"🔔"}</div>
        <div style={{fontSize:17,fontWeight:700,color:T.text,marginBottom:8}}>{tab==="following"?"Not following anyone yet":"No followers yet"}</div>
        <div style={{fontSize:14,lineHeight:1.6}}>{tab==="following"?"Enter a friend's email above to follow their hobby progress.":"Share your email with friends to get followers."}</div>
      </div>}
      {!loading&&displayList.map((email,i)=>{
        const profile=liveData[email];
        const name=(profile&&profile.display_name)||email.split("@")[0];
        const col=acolor(name);
        const pjs=(profile&&profile.profile&&profile.profile.projects)||[];
        const painted=pjs.reduce((a,p)=>a+(p.stats&&p.stats.painted||0),0);
        const total=pjs.reduce((a,p)=>a+(p.stats&&p.stats.total||0),0);
        const pct=total?Math.round(painted/total*100):0;
        const fakeStats={painted,built:pjs.reduce((a,p)=>a+(p.stats&&p.stats.built||0),0),unbuilt:pjs.reduce((a,p)=>a+(p.stats&&p.stats.unbuilt||0),0),new_in_box:pjs.reduce((a,p)=>a+(p.stats&&p.stats.new_in_box||0),0),total};
        const alsoFollowing=tab==="followers"&&followingList.includes(email);
        return <div key={i} style={{background:"#fff",borderRadius:18,padding:"16px 18px",marginBottom:10,boxShadow:T.shadow}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:total?8:0}}>
            <div onClick={()=>openProfile(email)} style={{width:46,height:46,borderRadius:"50%",background:col+"18",border:"2px solid "+col+"30",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:col,flexShrink:0,cursor:"pointer"}}>{initials(name)}</div>
            <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>openProfile(email)}>
              <div style={{fontSize:16,fontWeight:700,color:T.text,lineHeight:1.2}}>{name}</div>
              <div style={{fontSize:12,color:T.text3,marginTop:2}}>{pjs.length} project{pjs.length!==1?"s":""}{total>0&&<span> · {painted}/{total} painted ({pct}%)</span>}</div>
              {tab==="followers"&&alsoFollowing&&<span style={{fontSize:11,color:T.green,fontWeight:700}}>✓ Following back</span>}
              {tab==="followers"&&!alsoFollowing&&<span style={{fontSize:11,color:T.text3}}>Not following back</span>}
            </div>
            <div style={{display:"flex",gap:6,flexShrink:0,flexDirection:"column",alignItems:"flex-end"}}>
              <Btn sm v="blue" onClick={()=>openProfile(email)}>View →</Btn>
              {tab==="following"&&<button onClick={()=>removeFollow(email)} style={{background:"none",border:"1px solid "+T.border,borderRadius:8,padding:"4px 10px",fontSize:11,color:T.text3,cursor:"pointer",fontFamily:"inherit"}}>Unfollow</button>}
              {tab==="followers"&&!alsoFollowing&&<Btn sm v="ok" onClick={()=>followBack(email)} sx={{opacity:busy?0.6:1}}>{busy?"...":"Follow back"}</Btn>}
              {tab==="followers"&&<button onClick={()=>blockFollower(email)} style={{background:"none",border:"1px solid "+T.red+"30",borderRadius:8,padding:"4px 10px",fontSize:11,color:T.red,cursor:"pointer",fontFamily:"inherit"}}>Block</button>}
            </div>
          </div>
          {total>0&&<Bar stats={fakeStats}/>}
        </div>;
      })}
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid "+T.border,display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom)"}}>
      {[{id:"dashboard",icon:"📊",label:"Dashboard"},{id:"projects",icon:"⚔️",label:"Projects"},{id:"following",icon:"👥",label:"Following"},{id:"paints",icon:"🎨",label:"Paints"}].map(({id,icon,label})=><button key={id} onClick={()=>onClose(id)} style={{flex:1,padding:"10px 4px 9px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,opacity:id==="following"?1:0.45}}><span style={{fontSize:18}}>{icon}</span><span style={{fontSize:9,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",color:id==="following"?T.accent:T.text3,fontFamily:"inherit"}}>{label}</span>{id==="following"&&<div style={{width:18,height:2,borderRadius:1,background:T.accent,marginTop:1}}/>}</button>)}
    </div>
  </div>;
}

function App(){
  const {sess,signIn,signOut}=useAuth();
  const [skipLogin,setSkipLogin]=useState(()=>lsGet(SK.skip,false));
  const [data,setData]=useState(()=>{
    const fresh=lsGet(SK.data,null);
    if(fresh)return fresh;
    // Migrate from older ColorQuest / Muster Roll storage keys
    const old=lsGet("cq-data-v4",null)||lsGet("mr-data-v3",null)||lsGet("cq-data-v3",null);
    if(old)return old;
    return DEF_DATA;
  });
  const {paints,setPaints,addP,delP,togP}=usePaints();
  const {log,setLog,addE}=useLog();
  const [syncSt,setSyncSt]=useState("idle");
  const [syncErr,setSyncErr]=useState(null);
  const [cloudLoaded,setCloudLoaded]=useState(false);
  const [screen,setScreen]=useState("dashboard");
  const [pid,setPid]=useState(null);
  const [tab,setTab]=useState("units");
  const [modal,setModal]=useState(null);
  const [recMod,setRecMod]=useState(null);
  const [paintMod,setPaintMod]=useState(null);
  const [shareTgt,setShareTgt]=useState(null);
  const [splitTgt,setSplitTgt]=useState(null);
  const [editTgt,setEditTgt]=useState(null);
  const [form,setForm]=useState({});
  const [filter,setFilter]=useState("all");
  const [search,setSearch]=useState("");
  const [toast,setToast]=useState(null);
  const [showBkp,setShowBkp]=useState(false);
  const swipeRef=useRef();
  const swipeStart=useRef(0);

  useEffect(()=>{lsSet(SK.data,data);},[data]);
  useEffect(()=>{const last=lsGet(SK.backup,null);if(last){const days=(Date.now()-new Date(last).getTime())/(1000*60*60*24);if(days>=7)setShowBkp(true);}},[]);

  // ── Load from Supabase on sign-in ──────────────────────────────────────────
  useEffect(()=>{
    if(!sess||!sess.email||cloudLoaded)return;
    (async()=>{
      setSyncSt("syncing");
      const cloud=await sbLoad(sess.email);
      if(cloud){
        if(cloud.projects&&cloud.projects.length)setData({projects:cloud.projects});
        if(cloud.paints&&cloud.paints.length)setPaints(cloud.paints);
        if(cloud.log&&cloud.log.length)setLog(cloud.log);
      } else {
        // First time — push local data up
        await sbSave(sess.email,{projects:data.projects,paints,log});
      }
      setCloudLoaded(true);
      setSyncSt("synced");
      setSyncErr(null);
    })();
  },[sess,cloudLoaded]);

  // ── Save to Supabase on changes (debounced 1.5s) ─────────────────────────
  useEffect(()=>{
    if(!sess||!sess.email||!cloudLoaded)return;
    setSyncSt("syncing");
    const t=setTimeout(async()=>{
      const dn=lsGet(SK.dname,"");
      const [ok]=await Promise.all([
        sbSave(sess.email,{projects:data.projects,paints,log}),
        sbSaveProfile(sess.email,dn,data),
      ]);
      if(ok){setSyncSt("synced");setSyncErr(null);}
      else{setSyncSt("error");setSyncErr("Sync failed — check your connection.");}
    },1500);
    return()=>clearTimeout(t);
  },[data,paints,log,sess,cloudLoaded]);

  const toast2=(msg,color)=>{setToast({msg,color:color||T.green});setTimeout(()=>setToast(null),2600);};
  const close=()=>{setModal(null);setForm({});setEditTgt(null);};
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const mut=fn=>setData(d=>({projects:fn(d.projects)}));

  const addProject=()=>{if(!form.name||!form.name.trim())return;mut(ps=>[...ps,{id:nid(),name:form.name.trim(),faction:form.faction?form.faction.trim():"",units:[],recipes:[]}]);close();};
  const saveProject=()=>{mut(ps=>ps.map(p=>p.id===editTgt?{...p,name:form.name?form.name.trim():p.name,faction:form.faction!==undefined?form.faction.trim():p.faction}:p));close();};
  const delProject=id=>{mut(ps=>ps.filter(p=>p.id!==id));setScreen("projects");};

  const addUnit=()=>{if(!form.name||!form.name.trim())return;const u={id:nid(),name:form.name.trim(),models:parseInt(form.models)||1,status:form.status||"new_in_box",notes:form.notes||"",photos:form.photos||{before:null,wip:null,after:null},subgroups:null};mut(ps=>ps.map(p=>p.id===pid?{...p,units:[...p.units,u]}:p));close();};
  const saveUnit=()=>{mut(ps=>ps.map(p=>p.id===pid?{...p,units:p.units.map(u=>u.id===editTgt?{...u,name:form.name?form.name.trim():u.name,models:parseInt(form.models)||u.models,status:form.status||u.status,notes:form.notes!==undefined?form.notes:u.notes,photos:form.photos!==undefined?form.photos:safeP(u),subgroups:form.subgroups!==undefined?form.subgroups:u.subgroups}:u)}:p));close();};
  const delUnit=id=>mut(ps=>ps.map(p=>p.id===pid?{...p,units:p.units.filter(u=>u.id!==id)}:p));
  const chgStatus=(uid,newSt)=>{const proj=data.projects.find(p=>p.id===pid);const unit=proj&&proj.units.find(u=>u.id===uid);if(unit)addE(proj.name,unit.name,unit.models,unit.status,newSt);mut(ps=>ps.map(p=>p.id===pid?{...p,units:p.units.map(u=>u.id===uid?{...u,status:newSt}:u)}:p));toast2(unit?unit.name+" updated":"Updated");};
  const updSubgroups=(uid,sgs)=>{mut(ps=>ps.map(p=>p.id===pid?{...p,units:p.units.map(u=>u.id===uid?{...u,subgroups:sgs}:u)}:p));};
  const dupUnit=u=>{const copy={...u,id:nid(),name:u.name+" (copy)",status:"new_in_box",subgroups:null,photos:{before:null,wip:null,after:null}};mut(ps=>ps.map(p=>p.id===pid?{...p,units:[...p.units,copy]}:p));toast2("Duplicated: "+u.name);};

  const saveRecipe=recipe=>{if(recMod&&recMod.mode==="add"){const r={...recipe,id:nid()};mut(ps=>ps.map(p=>p.id===pid?{...p,recipes:[...(p.recipes||[]),r]}:p));}else{mut(ps=>ps.map(p=>p.id===pid?{...p,recipes:(p.recipes||[]).map(r=>r.id===recipe.id?recipe:r)}:p));}setRecMod(null);};
  const delRecipe=id=>mut(ps=>ps.map(p=>p.id===pid?{...p,recipes:(p.recipes||[]).filter(r=>r.id!==id)}:p));

  const handleImport=(projects,mode)=>{const rm=projects.map(p=>({...p,id:nid(),units:(p.units||[]).map(u=>({...u,id:nid()})),recipes:(p.recipes||[]).map(r=>({...r,id:nid()}))}));if(mode==="replace")setData({projects:rm});else mut(ps=>[...ps,...rm]);toast2("Imported "+projects.length+" project"+(projects.length!==1?"s":""));};

  function doBackup(){dlJSON({_tr:1,exported:new Date().toISOString(),projects:data.projects},"tabletop-ready-backup.mrp");lsSet(SK.backup,new Date().toISOString());setShowBkp(false);toast2("Backup saved");}
  function expProject(p){dlJSON({_tr:1,exported:new Date().toISOString(),project:p},p.name.replace(/[^a-z0-9]/gi,"_")+".mrp");}

  const project=data.projects.find(p=>p.id===pid);
  const filteredUnits=project?project.units.filter(u=>(filter==="all"||u.status===filter)&&(!search||u.name.toLowerCase().includes(search.toLowerCase())||(u.notes||"").toLowerCase().includes(search.toLowerCase()))):[];
  const shownProjects=data.projects.filter(p=>!search||p.name.toLowerCase().includes(search.toLowerCase())||(p.faction||"").toLowerCase().includes(search.toLowerCase())||p.units.some(u=>u.name.toLowerCase().includes(search.toLowerCase())));

  function goTo(id){setPid(id);setScreen("detail");setSearch("");setTab("units");}

  if(sess===undefined)return <div style={{minHeight:"100dvh",background:T.bg0,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}><div style={{color:T.accent,fontSize:13,fontWeight:700,letterSpacing:"0.15em"}}>LOADING...</div></div>;
  if(!sess&&!skipLogin)return <Login onSignIn={signIn} onSkip={()=>{lsSet(SK.skip,true);setSkipLogin(true);}}/>;
  if(screen==="paints")return <PaintLibrary paints={paints} addP={addP} delP={delP} togP={togP} onClose={id=>setScreen(id&&typeof id==="string"?id:"projects")}/>;
  if(screen==="shopping")return <ShoppingList data={data} paints={paints} onClose={()=>setScreen("projects")}/>;
  if(screen==="following")return <Following onClose={id=>setScreen(id&&typeof id==="string"?id:"dashboard")} sess={sess}/>;
  if(screen==="account")return <Account sess={sess} status={syncSt} err={syncErr} onOut={()=>{signOut();setSkipLogin(false);lsSet(SK.skip,false);setScreen("dashboard");}} onClose={()=>setScreen("dashboard")}/>;

  const menuItems=[];
  if(screen==="dashboard"){menuItems.push({label:"Share Dashboard",icon:"🔗",action:()=>setModal("shareDB")});menuItems.push({label:"Export CSV",icon:"📄",action:()=>expCSV(data)});menuItems.push({label:"Export Backup",icon:"💾",action:doBackup});}
  if(screen==="projects"){menuItems.push({label:"Import Projects",icon:"📂",action:()=>setModal("import")});menuItems.push({label:"Export Backup",icon:"💾",action:doBackup});menuItems.push({label:"Export CSV",icon:"📄",action:()=>expCSV(data)});menuItems.push({label:"Paint Shopping List",icon:"🛒",action:()=>setScreen("shopping")});}
  if(screen==="detail"&&project){menuItems.push({label:"Share Project",icon:"🔗",action:()=>setShareTgt(project)});menuItems.push({label:"Export Project",icon:"💾",action:()=>{expProject(project);toast2("Exported");}});menuItems.push({label:"Edit Project",icon:"✏️",action:()=>{setForm({name:project.name,faction:project.faction});setEditTgt(pid);setModal("editProject");}});}
  const primary=screen==="projects"?{label:"+ Project",action:()=>{setModal("addProject");setForm({});}}:screen==="detail"&&tab==="units"?{label:"+ Unit",action:()=>{setModal("addUnit");setForm({status:"new_in_box",models:"1"});}}:screen==="detail"&&tab==="recipes"?{label:"+ Recipe",action:()=>setRecMod({recipe:null,mode:"add"})}:null;
  const dotC=syncSt==="synced"?T.green:syncSt==="syncing"?T.blue:syncSt==="error"?T.red:"transparent";

  return <div style={{minHeight:"100dvh",background:T.bg0,color:T.text,fontFamily:"inherit",display:"flex",flexDirection:"column"}}>
    {toast&&<div style={{position:"fixed",top:"calc(16px + env(safe-area-inset-top))",left:"50%",transform:"translateX(-50%)",background:"#fff",border:"1px solid "+toast.color+"50",borderRadius:12,padding:"10px 18px",fontSize:13,fontWeight:700,color:toast.color,zIndex:999,boxShadow:"0 8px 32px rgba(0,0,0,0.12)",whiteSpace:"nowrap",pointerEvents:"none"}}>{toast.msg}</div>}
    {!sess&&skipLogin&&<SessionBanner onSignIn={()=>{lsSet(SK.skip,false);setSkipLogin(false);}}/>}

    <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(255,255,255,0.95)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",borderBottom:"1px solid "+T.border,flexShrink:0}}>
      <div style={{padding:"calc(env(safe-area-inset-top) + 10px) 16px 10px",display:"flex",alignItems:"center",gap:8,minHeight:50}}>
        {/* Left: back arrow in detail */}
        {screen==="detail"
          ? <button onClick={()=>{setScreen("projects");setPid(null);setFilter("all");setSearch("");}} style={{background:"none",border:"none",color:T.text2,cursor:"pointer",width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:10,flexShrink:0,marginRight:2}}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
          : <div style={{width:34,flexShrink:0}}/>
        }
        {/* Centre: title */}
        <div style={{flex:1,minWidth:0}}>
          {screen==="detail"&&project
            ? <div style={{fontWeight:700,fontSize:17,color:T.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.2}}>
                {project.name}
                {project.faction&&<span style={{fontWeight:400,color:T.text3,fontSize:14}}> · {project.faction}</span>}
              </div>
            : <div style={{fontWeight:800,fontSize:16,color:T.text,letterSpacing:"-0.01em"}}>Tabletop Ready</div>
          }
        </div>
        {/* Right: account + menu */}
        <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
          <button onClick={()=>setScreen("account")} style={{background:"none",border:"none",cursor:"pointer",width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",borderRadius:10}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={T.text2} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            {dotC!=="transparent"&&<span style={{position:"absolute",top:5,right:5,width:7,height:7,borderRadius:"50%",background:dotC,border:"2px solid #fff",display:"block"}}/>}
          </button>
          <SettingsMenu items={menuItems} primary={primary}/>
        </div>
      </div>
      {/* Search bar */}
      {(screen==="projects"||screen==="detail")&&<div style={{padding:"0 14px 10px"}}>
        <div style={{position:"relative"}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.text3} strokeWidth="2.5" strokeLinecap="round" style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={screen==="projects"?"Search projects...":"Search units or notes..."} style={{...IS,paddingLeft:34,paddingTop:"9px",paddingBottom:"9px",background:T.bg2,fontSize:14}}/>
          {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:T.border,border:"none",borderRadius:"50%",width:20,height:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:T.text3,fontSize:12}}>x</button>}
        </div>
      </div>}
    </div>

    {showBkp&&screen!=="detail"&&<BackupBanner onExport={doBackup} onDismiss={()=>setShowBkp(false)}/>}

    <div style={{flex:1,overflowY:"auto"}}
      ref={swipeRef}
      onTouchStart={e=>{swipeStart.current=e.touches[0].clientX;}}
      onTouchEnd={e=>{
        const dx=e.changedTouches[0].clientX-swipeStart.current;
        if(Math.abs(dx)<60)return;
        const tabs=["dashboard","projects","following","paints"];
        const cur=tabs.indexOf(screen===" detail"?"projects":screen);
        if(cur<0)return;
        if(dx<0&&cur<tabs.length-1)setScreen(tabs[cur+1]);
        if(dx>0&&cur>0)setScreen(tabs[cur-1]);
      }}
    >
      {screen==="dashboard"&&<Dashboard data={data} log={log} onGoTo={goTo}/>}

      {screen==="projects"&&<div style={{padding:"14px 16px",maxWidth:680,margin:"0 auto",paddingBottom:"calc(88px + env(safe-area-inset-bottom))"}}>
        {(()=>{const g={new_in_box:0,unbuilt:0,built:0,painted:0,total:0};data.projects.forEach(p=>{const s=getStats(p);Object.keys(g).forEach(k=>g[k]+=(s[k]||0));});const pct=g.total?Math.round(g.painted/g.total*100):0;return <div style={{background:"linear-gradient(135deg,#5b6af008,#fff 70%)",borderRadius:18,padding:"16px 18px",marginBottom:14,marginTop:6,boxShadow:T.shadow}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}><div><div style={{fontSize:16,fontWeight:900,color:T.text}}>{g.total} <span style={{fontSize:13,fontWeight:500,color:T.text3}}>models</span></div><div style={{fontSize:12,color:T.text3,marginTop:2}}>{data.projects.length} project{data.projects.length!==1?"s":""}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:22,fontWeight:900,color:T.green}}>{pct}%</div><div style={{fontSize:11,color:T.text3}}>painted</div></div></div><Bar stats={g}/><div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:6}}>{Object.entries(SC).map(([k,sc])=>g[k]>0&&<span key={k} style={{fontSize:12,background:sc.bg,color:sc.color,borderRadius:20,padding:"3px 10px",fontWeight:700}}>{ICONS[k]} {g[k]}</span>)}</div></div>;})()}
        {shownProjects.length===0&&<div style={{textAlign:"center",padding:"60px 20px"}}>
      {search
        ?<><div style={{fontSize:32,marginBottom:12}}>🔍</div><div style={{fontSize:15,fontWeight:600,color:T.text,marginBottom:6}}>No projects match</div><div style={{fontSize:13,color:T.text3}}>Try a different search term</div></>
        :<><div style={{fontSize:48,marginBottom:16}}>🎨</div><div style={{fontSize:18,fontWeight:700,color:T.text,marginBottom:8}}>Welcome to Tabletop Ready</div><div style={{fontSize:14,color:T.text3,lineHeight:1.6,marginBottom:20}}>Start tracking your hobby progress by adding your first project</div><Btn onClick={()=>{setModal("addProject");setForm({});}}>+ Create First Project</Btn></>
      }
    </div>}
        {shownProjects.map(p=>{const s=getStats(p);const complete=s.total>0&&s.painted===s.total;return <div key={p.id} onClick={()=>goTo(p.id)} style={{background:"#fff",borderRadius:18,padding:"16px 18px",marginBottom:10,cursor:"pointer",boxShadow:T.shadow}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{fontWeight:700,fontSize:16,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",letterSpacing:"-0.01em"}}>{p.name}</div>{complete&&<span style={{fontSize:11,background:T.green+"18",color:T.green,border:"1px solid "+T.green+"30",borderRadius:20,padding:"2px 8px",fontWeight:700,flexShrink:0}}>Complete</span>}</div>{p.faction&&<div style={{fontSize:13,color:T.text3,marginTop:2}}>{p.faction}</div>}</div><div style={{textAlign:"right",flexShrink:0,marginLeft:10}}><div style={{fontWeight:700,color:T.accent,fontSize:22,lineHeight:1}}>{s.total}</div><div style={{fontSize:12,color:T.text3}}>models</div></div></div>
          <Bar stats={s}/>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:5}}>{Object.entries(SC).map(([k,c])=>s[k]>0&&<span key={k} style={{fontSize:12,color:c.color}}>{ICONS[k]} {s[k]} {c.label}</span>)}</div>
          <div style={{marginTop:6,fontSize:12,color:T.text3}}>{p.units.length} units, {(p.recipes||[]).length} recipes</div>
        </div>;})}
      </div>}

      {screen==="detail"&&project&&<div style={{padding:"12px 15px",maxWidth:680,margin:"0 auto",paddingBottom:"calc(80px + env(safe-area-inset-bottom))"}}>
        {(()=>{const s=getStats(project);return <div style={{background:"#fff",borderRadius:18,padding:"16px 18px",marginBottom:14,marginTop:6,boxShadow:T.shadow}}><div style={{fontSize:11,color:T.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:5}}>{s.total} models - {project.units.length} units - {(project.recipes||[]).length} recipes</div><Bar stats={s}/><div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:6}}>{Object.entries(SC).map(([k,c])=><div key={k} style={{fontSize:12}}><span style={{color:T.text3}}>{c.label}: </span><span style={{color:c.color,fontWeight:700}}>{s[k]||0}</span></div>)}</div></div>;})()}
        <TabBar tabs={[{id:"units",label:"Units ("+project.units.length+")"},{id:"recipes",label:"Recipes ("+(project.recipes||[]).length+")"},{id:"showcase",label:"Showcase"}]} active={tab} onChange={setTab}/>
        {tab==="units"&&<>
          <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
            {[["all","All",null],...Object.entries(SC).map(([k,v])=>[k,ICONS[k],v.color])].map(([k,icon,color])=>{
              const active=filter===k;
              return <button key={k} onClick={()=>setFilter(k)} style={{flexShrink:0,display:"flex",alignItems:"center",gap:5,background:active?(color?color+"18":T.accentDim):"transparent",border:"1px solid "+(active?(color||T.accent)+"40":T.border),borderRadius:20,padding:"6px 12px",cursor:"pointer",color:active?(color||T.accent):T.text3,fontSize:12,fontWeight:active?700:500,fontFamily:"inherit",whiteSpace:"nowrap"}}>
                {icon&&<span style={{fontSize:14}}>{icon}</span>}<span>{k==="all"?"All":SC[k].label}</span>
              </button>;
            })}
          </div>
          {filteredUnits.length===0&&<div style={{textAlign:"center",padding:"48px 20px"}}>
      {project.units.length===0
        ?<><div style={{fontSize:40,marginBottom:12}}>⚔️</div><div style={{fontSize:16,fontWeight:600,color:T.text,marginBottom:8}}>No units yet</div><div style={{fontSize:13,color:T.text3,lineHeight:1.6,marginBottom:18}}>Add your first unit to start tracking this project</div><Btn onClick={()=>{setModal("addUnit");setForm({status:"new_in_box",models:"1"});}}>+ Add First Unit</Btn></>
        :<><div style={{fontSize:32,marginBottom:12}}>🔍</div><div style={{fontSize:15,fontWeight:600,color:T.text,marginBottom:6}}>No units match</div><div style={{fontSize:13,color:T.text3}}>Try a different filter</div></>
      }
    </div>}
          {filteredUnits.map(u=><UnitCard key={u.id} unit={u} onEdit={u=>{setEditTgt(u.id);setForm({name:u.name,models:String(u.models),status:u.status,notes:u.notes||"",photos:safeP(u),subgroups:u.subgroups});setModal("editUnit");}} onDelete={delUnit} onStatus={chgStatus} onSplit={u=>setSplitTgt(u)} onDupe={dupUnit} onUpdateSubgroups={updSubgroups}/>)}
        </>}
        {tab==="recipes"&&<>{(project.recipes||[]).length===0&&<div style={{textAlign:"center",color:T.text3,padding:"40px 0",fontSize:14}}>No recipes yet. Tap + Recipe to add one.</div>}{(project.recipes||[]).map(r=><RecipeCard key={r.id} recipe={r} onEdit={r=>setRecMod({recipe:r,mode:"edit"})} onDelete={delRecipe} onPaint={r=>setPaintMod(r)}/>)}</>}
        {tab==="showcase"&&(()=>{const shots=project.units.flatMap(u=>{const ph=safeP(u);return[{img:ph.after,lbl:"After",u},{img:ph.wip,lbl:"WIP",u},{img:ph.before,lbl:"Before",u}].filter(s=>s.img);});return <div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{shots.map(({img,lbl,u},i)=><div key={i} style={{borderRadius:14,overflow:"hidden",position:"relative",border:"1px solid "+T.border}}><img src={img} alt={u.name} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}}/><div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.75))",padding:"20px 10px 8px"}}><div style={{fontSize:12,fontWeight:800,color:"#fff"}}>{u.name}</div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:3}}><Badge status={u.status}/><span style={{fontSize:10,color:"rgba(255,255,255,0.7)",background:"rgba(0,0,0,0.4)",borderRadius:4,padding:"2px 5px"}}>{lbl}</span></div></div></div>)}</div>{shots.length===0&&<div style={{textAlign:"center",color:T.text3,padding:"50px 0",fontSize:13}}>No photos yet.</div>}</div>;})()}
        <div style={{marginTop:28,borderTop:"1px solid "+T.border,paddingTop:14}}><Btn v="del" sm onClick={()=>{if(window.confirm("Delete this project?"))delProject(project.id);}}>Delete Project</Btn></div>
      </div>}
    </div>

    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(255,255,255,0.95)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",borderTop:"1px solid "+T.border,zIndex:100,paddingBottom:"env(safe-area-inset-bottom)"}}>
      <div style={{display:"flex",padding:"6px 8px"}}>
        {[{id:"dashboard",icon:"📊",label:"Home"},{id:"projects",icon:"⚔️",label:"Projects"},{id:"following",icon:"👥",label:"Following"},{id:"paints",icon:"🎨",label:"Paints"}].map(({id,icon,label})=>{
          const active=screen===id||(screen==="detail"&&id==="projects");
          return <button key={id} onClick={()=>{if(id==="projects"&&screen==="detail"){setScreen("projects");setPid(null);setFilter("all");setSearch("");}else setScreen(id);}}
            style={{flex:1,padding:"8px 4px 6px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,WebkitTapHighlightColor:"transparent"}}>
            <div style={{width:44,height:30,borderRadius:20,background:active?T.accentDim:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.15s"}}>
              <span style={{fontSize:20}}>{icon}</span>
            </div>
            <span style={{fontSize:10,fontWeight:active?700:400,color:active?T.accent:T.text3,fontFamily:"inherit",letterSpacing:"0.01em"}}>{label}</span>
          </button>;
        })}
      </div>
    </div>

    {paintMod&&<PaintMode recipe={paintMod} onClose={()=>setPaintMod(null)} paints={paints}/>}
    {splitTgt&&<SplitModal unit={splitTgt} onSave={u=>{mut(ps=>ps.map(p=>p.id===pid?{...p,units:p.units.map(x=>x.id===u.id?u:x)}:p));}} onClose={()=>setSplitTgt(null)}/>}
    {shareTgt&&<ShareProjectModal project={shareTgt} sess={sess} onClose={()=>setShareTgt(null)}/>}
    {modal==="shareDB"&&<ShareDBModal data={data} sess={sess} onClose={close}/>}
    {modal==="import"&&<ImportModal onClose={close} onImport={handleImport}/>}
    {modal==="addProject"&&<Modal title="New Project" onClose={close}><Inp label="Project Name" placeholder="e.g. Orks Waaagh!" value={form.name||""} onChange={e=>sf("name",e.target.value)} autoFocus/><Inp label="Faction / Army" placeholder="e.g. Orks, Space Marines..." value={form.faction||""} onChange={e=>sf("faction",e.target.value)}/><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}><Btn v="sec" sm onClick={close}>Cancel</Btn><Btn sm onClick={addProject}>Create</Btn></div></Modal>}
    {modal==="editProject"&&<Modal title="Edit Project" onClose={close}><Inp label="Project Name" value={form.name||""} onChange={e=>sf("name",e.target.value)} autoFocus/><Inp label="Faction / Army" value={form.faction||""} onChange={e=>sf("faction",e.target.value)}/><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}><Btn v="sec" sm onClick={close}>Cancel</Btn><Btn sm onClick={saveProject}>Save</Btn></div></Modal>}
    {(modal==="addUnit"||modal==="editUnit")&&<Modal title={modal==="addUnit"?"Add Unit":"Edit Unit"} onClose={close} wide>
      <Inp label="Unit Name" placeholder="e.g. Tactical Squad..." value={form.name||""} onChange={e=>sf("name",e.target.value)} autoFocus/>
      <Field label="Number of Models" mb={13}>
      <input type="number" min="1" value={form.models!==undefined?form.models:""} 
        onChange={e=>sf("models",e.target.value)}
        onBlur={e=>{if(!e.target.value||parseInt(e.target.value)<1)sf("models","1");}}
        style={{...IS,fontSize:16}}/>
    </Field>
      <Sel label="Status" value={form.status||"new_in_box"} onChange={e=>sf("status",e.target.value)}>{Object.entries(SC).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</Sel>
      <Txt label="Notes" placeholder="Assembly notes, colour cues..." value={form.notes||""} onChange={e=>sf("notes",e.target.value)}/>
      <MultiPhoto photos={form.photos||{before:null,wip:null,after:null}} onChange={v=>sf("photos",v)} sess={sess} projectId={pid} unitId={editTgt||"new"}/>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><Btn v="sec" sm onClick={close}>Cancel</Btn><Btn sm onClick={modal==="addUnit"?addUnit:saveUnit}>{modal==="addUnit"?"Add Unit":"Save"}</Btn></div>
    </Modal>}
    {recMod&&<RecipeModal recipe={recMod.recipe} onSave={saveRecipe} onClose={()=>setRecMod(null)} paints={paints} addP={addP}/>}
  </div>;
}

function Root(){
  const hash=window.location.hash;
  if(hash.startsWith("#dashboard=")){const d=decDB(hash);if(d)return <SharedDB payload={d}/>;}
  if(hash.startsWith("#share=")){const d=decShr(hash);if(d)return <SharedView projects={d.projects} by={d.by}/>;}
  return <App/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
