// ── Share helpers ─────────────────────────────────────────────────────────────
function encodeShare(projects){try{return btoa(unescape(encodeURIComponent(JSON.stringify({_mrp:1,projects}))))}catch{return null}}
function decodeShare(hash){try{const b64=hash.replace(/^#share=/,"");const p=JSON.parse(decodeURIComponent(escape(atob(b64))));return p._mrp&&p.projects?p.projects:null}catch{return null}}
function buildShareUrl(projects){const e=encodeShare(projects);return e?window.location.href.split("#")[0]+"#share="+e:null}

// Dashboard share: a lightweight summary (no units/photos/recipes) so the
// URL stays small even with many projects.
function encodeDashboardShare(data){
  try{
    const summary=data.projects.map(p=>{
      const s=getStats(p);
      const backlog=p.units.filter(u=>u.status!=="painted").map(u=>({name:u.name,models:u.models,status:u.status}));
      return{
        name:p.name,
        faction:p.faction||"",
        stats:s,
        unitCount:p.units.length,
        recipeCount:(p.recipes||[]).length,
        backlog
      };
    });
    return btoa(unescape(encodeURIComponent(JSON.stringify({_cqd:1,ts:Date.now(),projects:summary}))));
  }catch{return null}
}
function decodeDashboardShare(hash){
  try{
    const b64=hash.replace(/^#dashboard=/,"");
    const p=JSON.parse(decodeURIComponent(escape(atob(b64))));
    return p._cqd&&p.projects?p:null;
  }catch{return null}
}
function buildDashboardShareUrl(data){
  const e=encodeDashboardShare(data);
  return e?window.location.href.split("#")[0]+"#dashboard="+e:null;
}

// ── GOOGLE DRIVE SYNC ─────────────────────────────────────────────────────────
// App data is stored as a single JSON file in the user's hidden "appDataFolder"
// on Google Drive — only this app can see/access it, the user never sees it
// cluttering their normal Drive.

const DRIVE_API="https://www.googleapis.com/drive/v3";
const DRIVE_UPLOAD_API="https://www.googleapis.com/upload/drive/v3";

async function driveFindFileId(token){
  const res=await fetch(`${DRIVE_API}/files?spaces=appDataFolder&q=name='${DRIVE_FILE_NAME}'&fields=files(id,name)`,{
    headers:{Authorization:`Bearer ${token}`}
  });
  if(!res.ok)throw new Error("Drive list failed: "+res.status);
  const json=await res.json();
  return json.files&&json.files.length?json.files[0].id:null;
}

async function cloudLoad(token){
  try{
    const fileId=await driveFindFileId(token);
    if(!fileId)return {data:null};
    const res=await fetch(`${DRIVE_API}/files/${fileId}?alt=media`,{headers:{Authorization:`Bearer ${token}`}});
    if(!res.ok){const txt=await res.text();console.error("cloudLoad HTTP",res.status,txt);return{data:null,error:`Load failed (${res.status})`}}
    return {data:await res.json()};
  }catch(e){console.error("cloudLoad error",e);return{data:null,error:e.message}}
}

async function cloudSave(token,payload){
  try{
    const fileId=await driveFindFileId(token);
    const body=JSON.stringify(payload);
    if(fileId){
      const res=await fetch(`${DRIVE_UPLOAD_API}/files/${fileId}?uploadType=media`,{
        method:"PATCH",
        headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},
        body
      });
      if(!res.ok){const txt=await res.text();console.error("cloudSave PATCH HTTP",res.status,txt);return{ok:false,error:`Save failed (${res.status}): ${txt.slice(0,120)}`}}
      return{ok:true};
    } else {
      const metadata={name:DRIVE_FILE_NAME,parents:["appDataFolder"]};
      const form=new FormData();
      form.append("metadata",new Blob([JSON.stringify(metadata)],{type:"application/json"}));
      form.append("file",new Blob([body],{type:"application/json"}));
      const res=await fetch(`${DRIVE_UPLOAD_API}/files?uploadType=multipart`,{
        method:"POST",
        headers:{Authorization:`Bearer ${token}`},
        body:form
      });
      if(!res.ok){const txt=await res.text();console.error("cloudSave POST HTTP",res.status,txt);return{ok:false,error:`Save failed (${res.status}): ${txt.slice(0,120)}`}}
      return{ok:true};
    }
  }catch(e){console.error("cloudSave error",e);return{ok:false,error:e.message}}
}

async function fetchUserEmail(token){
  try{
    const res=await fetch("https://www.googleapis.com/oauth2/v2/userinfo",{headers:{Authorization:`Bearer ${token}`}});
    if(!res.ok)return null;
    const json=await res.json();
    return json.email||null;
  }catch{return null}
}

// ── AUTH HOOK ─────────────────────────────────────────────────────────────────
// session: undefined=loading, null=signed out, {token,email}=signed in
function useAuth(){
  const [session,setSession]=useState(undefined);
  const tokenClientRef=useRef(null);

  useEffect(()=>{
    // Try restoring a previously stored token (valid for ~1hr from issue)
    const stored=lsLoad(TOKEN_KEY,null);
    if(stored&&stored.expiresAt>Date.now()){
      setSession({token:stored.token,email:stored.email});
    } else {
      lsSave(TOKEN_KEY,null);
      setSession(null);
    }
  },[]);

  // Initialize Google token client once the GSI script is ready
  useEffect(()=>{
    let tries=0;
    const init=()=>{
      if(window.google&&window.google.accounts&&window.google.accounts.oauth2){
        tokenClientRef.current=window.google.accounts.oauth2.initTokenClient({
          client_id:GOOGLE_CLIENT_ID,
          scope:DRIVE_SCOPE,
          callback:async(resp)=>{
            if(resp.error){console.error("Google auth error",resp);return}
            const token=resp.access_token;
            const expiresAt=Date.now()+(resp.expires_in||3600)*1000-60000;
            const email=await fetchUserEmail(token);
            const sess={token,email,expiresAt};
            lsSave(TOKEN_KEY,sess);
            setSession({token,email});
          }
        });
      } else if(tries<50){
        tries++;setTimeout(init,100);
      }
    };
    init();
  },[]);

  const signIn=useCallback(()=>{
    if(tokenClientRef.current)tokenClientRef.current.requestAccessToken({prompt:"consent"});
  },[]);

  const signOut=useCallback(()=>{
    const stored=lsLoad(TOKEN_KEY,null);
    if(stored&&stored.token&&window.google?.accounts?.oauth2){
      window.google.accounts.oauth2.revoke(stored.token,()=>{});
    }
    lsSave(TOKEN_KEY,null);
    setSession(null);
  },[]);

  // Check token expiry every 30s; flip session to null so app can prompt re-auth
  useEffect(()=>{
    const t=setInterval(()=>{
      const stored=lsLoad(TOKEN_KEY,null);
      if(stored&&stored.expiresAt&&stored.expiresAt<Date.now()){
        lsSave(TOKEN_KEY,null);
        setSession(null);
      }
    },30000);
    return()=>clearInterval(t);
  },[]);

  return{session,signIn,signOut};
}

function exportCSV(data){const rows=[["Project","Faction","Unit","Models","Status","Notes"]];data.projects.forEach(p=>p.units.forEach(u=>rows.push([p.name,p.faction||"",u.name,u.models,SC[u.status].label,(u.notes||"").replace(/\n/g," | ")])));const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="colorquest.csv";a.click()}
function dlJSON(obj,fn){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(obj,null,2)],{type:"application/json"}));a.download=fn;a.click()}
function exportProject(p){dlJSON({_mrp:MRP,exported:new Date().toISOString(),project:p},p.name.replace(/[^a-z0-9]/gi,"_")+".mrp")}
function exportAll(d){dlJSON({_mrp:MRP,exported:new Date().toISOString(),projects:d.projects},"colorquest-backup.mrp")}
function toBase64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f)})}
function readText(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsText(f)})}
async function parseImport(file){try{const p=JSON.parse(await readText(file));if(!p._mrp)return{ok:false,error:"Not a valid .mrp file."};const raw=p.projects?p.projects:p.project?[p.project]:null;if(!raw?.length)return{ok:false,error:"No projects found."};for(const x of raw)if(!x.name||!Array.isArray(x.units))return{ok:false,error:"Invalid data."};return{ok:true,projects:raw}}catch{return{ok:false,error:"Could not read file."}}}

function usePaints(){
  const [paints,setPaints]=useState(()=>lsLoad(SK_PAINTS,DEFAULT_PAINTS));
  useEffect(()=>{lsSave(SK_PAINTS,paints)},[paints]);
  const addPaint=p=>{const np={...p,id:"p"+Date.now(),owned:p.owned!==undefined?p.owned:true};setPaints(ps=>[...ps,np]);return np};
  const delPaint=id=>setPaints(ps=>ps.filter(p=>p.id!==id));
  const toggleOwned=id=>setPaints(ps=>ps.map(p=>p.id===id?{...p,owned:!p.owned}:p));
  return{paints,addPaint,delPaint,toggleOwned,setPaints};
}

    </div>

      <select value={step.paint||""} onChange={e=>onChange({...step,paint:e.target.value})} style={ss}><option value="">— Select paint —</option>{paintsForSelection.map(p=><option key={p.id} value={p.name}>{p.name}{p.owned===false?" ○":""}</option>)}</select>
    </div>
    {step.paint&&!inLibrary&&!savingNew&&(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:T.yellow+"18",border:`1px solid ${T.yellow}35`,borderRadius:10,padding:"7px 10px"}}><span style={{fontSize:14,color:T.yellow}}>"{step.paint}" not in library</span><Btn sm v="ok" onClick={()=>{setSavingNew(true);setNewName(step.paint)}}>+ Save</Btn></div>)}
    {!step.paint&&!savingNew&&(<button onClick={()=>setSavingNew(true)} style={{background:"none",border:`1px dashed ${T.border2}`,borderRadius:10,padding:"7px 10px",fontSize:14,color:T.text3,cursor:"pointer",textAlign:"left",fontFamily:"'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"}}>+ Type a paint not in the list…</button>)}
    {savingNew&&(<div style={{background:T.bg1,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 12px"}}><div style={{fontSize:14,color:T.text2,fontWeight:700,marginBottom:7,letterSpacing:"0.03em",textTransform:"uppercase"}}>Add paint to library</div><input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Paint name…" style={{...IS,marginBottom:7,fontSize:14}} autoFocus/>{!step.brand&&<input value={step.brand||""} onChange={e=>onChange({...step,brand:e.target.value})} placeholder="Brand (e.g. Citadel)…" style={{...IS,marginBottom:7,fontSize:14}}/>}{!step.type&&<input value={step.type||""} onChange={e=>onChange({...step,type:e.target.value})} placeholder="Type (e.g. Base, Shade)…" style={{...IS,marginBottom:7,fontSize:14}}/>}<div style={{display:"flex",gap:7}}><Btn sm v="sec" onClick={()=>{setSavingNew(false);setNewName("")}}>Cancel</Btn><Btn sm v="ok" onClick={handleSaveNew}>Save to Library</Btn></div></div>)}
  </div>);

function RecipeModal({recipe,onSave,onClose,paints,addPaint}){
  const [name,setName]=useState(recipe?.name||"");
  const [steps,setSteps]=useState(()=>recipe?.steps?.length?recipe.steps.map(s=>({...s})):[newStep()]);
  function updateStep(i,s){setSteps(ss=>ss.map((x,j)=>j===i?s:x))}
  function removeStep(i){setSteps(ss=>ss.filter((_,j)=>j!==i))}
  function moveStep(i,dir){setSteps(ss=>{const a=[...ss];const b=a[i];a[i]=a[i+dir];a[i+dir]=b;return a})}
  function save(){if(!name.trim())return;onSave({...(recipe||{}),name:name.trim(),steps})}
  return(<Modal title={recipe?"Edit Recipe":"New Recipe"} onClose={onClose} wide>
    <Inp label="Recipe Name" placeholder="e.g. Skin, Armour, Basing…" value={name} onChange={e=>setName(e.target.value)} autoFocus/>
    <div style={{marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><label style={LS}>Steps</label><Btn sm v="blue" onClick={()=>setSteps(ss=>[...ss,newStep()])}>+ Add Step</Btn></div>

      {steps.length===0&&<div style={{textAlign:"center",padding:"16px 0",color:T.text3,fontSize:14}}>No steps yet</div>}
    </div>

  </Modal>);
}

// ── ▶ PAINTING MODE (fullscreen step-by-step guide) ───────────────────────────
function PaintingMode({recipe,onClose,paints}){
  const steps=recipe.steps||[];
  const [idx,setIdx]=useState(0);
  const [done,setDone]=useState(new Set());
  const step=steps[idx];
  const col=STEP_COLS[idx%STEP_COLS.length];
  const allDone=done.size===steps.length;
  const selectedPaint=useMemo(()=>step&&paints.find(p=>p.name===step.paint&&(!step.brand||p.brand===step.brand)),[paints,step]);

  if(steps.length===0)return null;

  function markDone(){setDone(d=>new Set([...d,idx]));if(idx<steps.length-1)setIdx(i=>i+1)}
  function prev(){if(idx>0)setIdx(i=>i-1)}
  function next(){if(idx<steps.length-1)setIdx(i=>i+1)}

  return(<Modal fullscreen onClose={onClose}>
    {/* Header */}
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"calc(14px + env(safe-area-inset-top)) 16px 14px",borderBottom:`1px solid ${T.border}`,position:"sticky",top:0,background:T.bg1,zIndex:10}}>
      <button onClick={onClose} style={{background:"none",border:"none",color:T.text2,cursor:"pointer",fontSize:22,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:14,color:T.text3,letterSpacing:"0.03em",textTransform:"uppercase"}}>Painting Mode</div>
        <div style={{fontWeight:900,fontSize:15,color:T.text}}>{recipe.name}</div>
      </div>
      <div style={{fontSize:14,color:T.text3,fontWeight:700}}>{idx+1}/{steps.length}</div>
    </div>

    {/* Progress dots */}
    <div style={{display:"flex",gap:4,padding:"12px 16px 0",justifyContent:"center"}}>
      {steps.map((_,i)=><div key={i} onClick={()=>setIdx(i)} style={{width:i===idx?24:8,height:8,borderRadius:8,background:done.has(i)?T.green:i===idx?T.accent:T.border,transition:"all 0.2s",cursor:"pointer"}}/>)}
    </div>

    {/* Step content */}
    <div style={{padding:"20px 16px",flex:1,maxWidth:500,margin:"0 auto",width:"100%"}}>
      {/* Step number + phase */}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <div style={{width:48,height:48,borderRadius:18,background:col+"20",border:`2px solid ${col}60`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:900,color:col,flexShrink:0}}>{idx+1}</div>
        <div>
          <div style={{fontSize:14,color:T.text3,letterSpacing:"0.03em",textTransform:"uppercase",fontWeight:700}}>Step {idx+1}</div>
          <div style={{fontSize:22,fontWeight:900,color:T.text,lineHeight:1.1}}>{step.phase}</div>
        </div>
        {done.has(idx)&&<div style={{marginLeft:"auto",fontSize:22}}>✅</div>}
      </div>

      {/* Paint info card */}
      <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:18,padding:"18px",marginBottom:16,textAlign:"center"}}>
        <div style={{fontSize:24,marginBottom:8}}>🎨</div>
        <div style={{fontSize:22,fontWeight:900,color:T.text,marginBottom:6}}>{step.paint||<em style={{color:T.text3,fontSize:16}}>No paint specified</em>}</div>
        {(step.brand||step.type)&&<div style={{fontSize:14,color:T.text3}}>{[step.brand,step.type].filter(Boolean).join(" — ")}</div>}
        {selectedPaint&&<div style={{marginTop:8,fontSize:14,fontWeight:700,color:selectedPaint.owned?T.green:T.red}}>{selectedPaint.owned?"✓ You own this paint":"✗ You need to buy this paint"}</div>}
      </div>

      {/* Notes */}
      {step.notes&&<div style={{background:T.yellow+"14",border:`1px solid ${T.yellow}30`,borderRadius:14,padding:"14px 17px",marginBottom:16,fontSize:14,color:T.text2,lineHeight:1.6}}>💡 {step.notes}</div>}

      {/* Actions */}
      {allDone
        ? <div style={{textAlign:"center",padding:"20px 0"}}><div style={{fontSize:36,marginBottom:12}}>🎉</div><div style={{fontSize:18,fontWeight:900,color:T.green,marginBottom:8}}>Recipe Complete!</div><div style={{fontSize:14,color:T.text3,marginBottom:20}}>All {steps.length} steps done.</div><Btn onClick={onClose} sx={{width:"100%"}}>Done</Btn></div>
        : <button onClick={markDone} style={{width:"100%",background:done.has(idx)?T.bg2:T.accent,color:done.has(idx)?T.text2:"#fff",border:`1px solid ${done.has(idx)?T.border:"transparent"}`,borderRadius:16,padding:"16px",fontSize:16,fontWeight:900,cursor:"pointer",fontFamily:"'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif",transition:"all 0.2s"}}>
            {done.has(idx)?"✓ Done — tap to re-mark":"✓ Step Complete"}
          </button>
      }
    </div>

    {/* Prev / Next */}
    <div style={{display:"flex",gap:8,padding:"16px",borderTop:`1px solid ${T.border}`,paddingBottom:"calc(16px + env(safe-area-inset-bottom))"}}>
      <Btn v="sec" onClick={prev} sx={{flex:1,opacity:idx===0?0.4:1}} disabled={idx===0}>← Prev</Btn>
      <Btn v="sec" onClick={next} sx={{flex:1,opacity:idx===steps.length-1?0.4:1}} disabled={idx===steps.length-1}>Next →</Btn>
    </div>
  </Modal>);
}

// ── Unit card with long-press / tap status cycle ──────────────────────────────
function UnitCard({unit,onEdit,onDelete,onStatusChange,onSplit}){
  const [pressing,setPressing]=useState(false);
  const timerRef=useRef(null);
  const nextStatus=()=>{const i=STATUS_ORDER.indexOf(unit.status);return STATUS_ORDER[(i+1)%STATUS_ORDER.length]};

  function startPress(e){e.preventDefault();timerRef.current=setTimeout(()=>{setPressing(false);onSplit(unit)},600);setPressing(true)}
  function endPress(){clearTimeout(timerRef.current);setPressing(false)}

  return(<div style={{background:T.bg1,border:`1px solid ${pressing?T.accent:T.border}`,borderRadius:16,padding:"15px 17px",marginBottom:9,transition:"border-color 0.15s"}}>
    <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
      {unit.photo&&<img src={unit.photo} alt="" style={{width:60,height:60,objectFit:"cover",borderRadius:14,border:`1px solid ${T.border}`,flexShrink:0}}/>}
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
          <div style={{fontWeight:800,fontSize:14,color:T.text}}>{unit.name}</div>
          <div style={{display:"flex",gap:5,flexShrink:0}}>
            <Btn sm v="sec" onClick={()=>onEdit(unit)}>Edit</Btn>
            <Btn sm v="del" onClick={()=>onDelete(unit.id)}>✕</Btn>

        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:5,flexWrap:"wrap"}}>
          {/* Tap status badge to cycle */}
          <button onTouchStart={startPress} onTouchEnd={endPress} onMouseDown={startPress} onMouseUp={endPress} onMouseLeave={endPress}
            onClick={()=>onStatusChange(unit.id,nextStatus())}
            style={{background:"none",border:"none",padding:0,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}
            title="Tap to cycle status · Hold to split unit">
            <Badge status={unit.status}/>
          </button>
          <span style={{fontSize:14,color:T.text2}}><span style={{color:T.accent,fontWeight:700}}>{unit.models}</span> model{unit.models!==1?"s":""}</span>
          <span style={{fontSize:14,color:T.text3,fontStyle:"italic"}}>tap badge to update</span>

          {unit.subgroups.map((sg,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,paddingLeft:8,borderLeft:`2px solid ${SC[sg.status].color}50`}}>
            <span style={{fontSize:14,color:T.text3}}>{sg.models}× </span>
            <Badge status={sg.status}/>
            <button onClick={()=>{const sgs=unit.subgroups.filter((_,j)=>j!==i);onEdit({...unit,subgroups:sgs.length?sgs:null})}} style={{background:"none",border:"none",color:T.text3,cursor:"pointer",fontSize:14,padding:0,marginLeft:"auto"}}>×</button>
          </div>)}
        </div>}
        {unit.notes&&<div style={{marginTop:7,fontSize:14,color:T.text2,lineHeight:1.55,borderLeft:`2px solid ${T.border}`,paddingLeft:8,whiteSpace:"pre-wrap"}}>{unit.notes}</div>}
      </div>
    </div>
  </div>);
}

// ── Split unit modal ──────────────────────────────────────────────────────────
function SplitModal({unit,onSave,onClose}){
  const [splitCount,setSplitCount]=useState(Math.floor(unit.models/2));
  const [splitStatus,setSplitStatus]=useState("painted");
  const remaining=unit.models-splitCount;
  function save(){
    if(splitCount<1||splitCount>=unit.models)return;
    const existing=unit.subgroups||[];
    const newSg=[...existing,{models:splitCount,status:splitStatus},{models:remaining,status:unit.status}];
    onSave({...unit,subgroups:newSg});
    onClose();
  }
  return(<Modal title={`Split: ${unit.name}`} onClose={onClose}>
    <div style={{background:T.bg2,borderRadius:14,padding:"12px",marginBottom:14,fontSize:14,color:T.text2,lineHeight:1.6}}>Split this unit into two sub-groups with different statuses — useful when only some models are painted.</div>
    <Inp label={`Models in first group (of ${unit.models})`} type="number" min={1} max={unit.models-1} value={splitCount} onChange={e=>setSplitCount(Math.max(1,Math.min(unit.models-1,parseInt(e.target.value)||1)))}/>
    <Sel label="Status for first group" value={splitStatus} onChange={e=>setSplitStatus(e.target.value)}>{Object.entries(SC).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}</Sel>
    <div style={{background:T.bg2,borderRadius:14,padding:"10px 12px",marginBottom:14,fontSize:14}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:T.text2}}>Group 1:</span><span style={{fontWeight:700,color:SC[splitStatus].color}}>{splitCount}× {SC[splitStatus].label}</span></div>
      <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:T.text2}}>Group 2:</span><span style={{fontWeight:700,color:SC[unit.status].color}}>{remaining}× {SC[unit.status].label}</span></div>
    </div>
    <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn v="sec" sm onClick={onClose}>Cancel</Btn><Btn sm onClick={save}>Split Unit</Btn></div>
  </Modal>);
}

// ── Settings ⋯ menu ──────────────────────────────────────────────────────────
// Shows a ⋯ button. If there's a primaryAction it shows as a filled pill
// (+Project / +Unit / +Recipe). Secondary actions live in a dropdown sheet.
function SettingsMenu({items,primaryAction}){
  const [open,setOpen]=useState(false);
  const ref=useRef();

  useEffect(()=>{
    if(!open)return;
    function handler(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false)}
    document.addEventListener("mousedown",handler);
    document.addEventListener("touchstart",handler);
    return()=>{document.removeEventListener("mousedown",handler);document.removeEventListener("touchstart",handler)}
  },[open]);

  return(
    <div style={{display:"flex",alignItems:"center",gap:4}}>
      {/* Primary CTA pill */}
      {primaryAction&&(
        <button onClick={primaryAction.action} style={{background:T.accent,color:"#fff",border:"none",borderRadius:20,padding:"6px 13px",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>
          {primaryAction.label}
        </button>
      )}

      {items&&items.length>0&&(
        <div ref={ref} style={{position:"relative"}}>
          <button onClick={()=>setOpen(o=>!o)} style={{background:open?T.bg2:"none",border:`1px solid ${open?T.border:"transparent"}`,borderRadius:10,width:34,height:34,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:T.text2,transition:"background 0.15s"}}>

          </button>

          {open&&(
            <div style={{position:"absolute",top:"calc(100% + 6px)",right:0,background:T.bg1,border:`1px solid ${T.border}`,borderRadius:14,minWidth:200,boxShadow:"0 8px 24px rgba(0,0,0,0.12)",zIndex:200,overflow:"hidden"}}>
              {items.map((item,i)=>(
                <button key={i} onClick={()=>{item.action();setOpen(false)}} style={{width:"100%",background:"none",border:"none",borderBottom:i<items.length-1?`1px solid ${T.border}`:"none",padding:"13px 16px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",textAlign:"left",fontFamily:"inherit",fontSize:14,color:T.text,fontWeight:500}}

  );
}

// ── Donut chart ───────────────────────────────────────────────────────────────
function Donut({stats,size=120}){
  const r=44,cx=60,cy=60,circ=2*Math.PI*r;
  if(!stats.total)return<div style={{width:size,height:size,borderRadius:"50%",background:T.bg2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:T.text3}}>Empty</div>;
  let off=0;const slices=Object.entries(SC).filter(([k])=>stats[k]>0).map(([k,c])=>{const d=stats[k]/stats.total*circ;const s={key:k,color:c.color,dash:d,off};off+=d;return s});
  return(<svg width={size} height={size} viewBox="0 0 120 120"><circle cx={cx} cy={cy} r={r} fill="none" stroke={T.bg2} strokeWidth="16"/>{slices.map(s=><circle key={s.key} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth="16" strokeDasharray={`${s.dash} ${circ-s.dash}`} strokeDashoffset={-s.off+circ/4}/>)}<text x={cx} y={cy-5} textAnchor="middle" fill={T.text} fontSize="18" fontWeight="900" fontFamily="inherit">{stats.total}</text><text x={cx} y={cy+12} textAnchor="middle" fill={T.text3} fontSize="9" fontFamily="inherit" letterSpacing="0.1em">MODELS</text></svg>);
}

// ── Monthly activity chart ────────────────────────────────────────────────────
const MONTH_NAMES=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function ActivityChart({log}){
  // Always reflects the last 6 *calendar* months, recomputed from the full log
  // history each render — entries keep their real dates, so past months stay
  // accurate even as new updates are logged.
  const months=useMemo(()=>{
    const now=new Date();
    const counts={};
    const order=[];
    for(let i=5;i>=0;i--){
      const d=new Date(now.getFullYear(),now.getMonth()-i,1);
      const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      counts[key]=0;
      order.push({key,label:MONTH_NAMES[d.getMonth()]});
    }
    log.filter(e=>e.toStatus==="painted").forEach(e=>{
      const k=e.date.slice(0,7);
      if(counts[k]!==undefined)counts[k]+=e.count;
    });
    return order.map(({key,label})=>({label,count:counts[key]}));
  },[log]);
  const max=Math.max(...months.map(m=>m.count),1);
  return(<div style={{background:T.bg1,border:`1px solid ${T.border}`,borderRadius:16,padding:"16px 18px",marginBottom:14}}>
    <div style={{fontSize:14,color:T.text3,letterSpacing:"0.03em",textTransform:"uppercase",marginBottom:12,fontWeight:700}}>Models Painted — Last 6 Months</div>
    <div style={{display:"flex",gap:6,alignItems:"flex-end",height:60}}>
      {months.map(({label,count})=><div key={label} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
        <div style={{fontSize:9,color:T.text3,fontWeight:700}}>{count||""}</div>
        <div style={{width:"100%",background:count>0?T.accent:T.bg2,borderRadius:6,height:`${Math.max(4,(count/max)*44)}px`,transition:"height 0.4s"}}/>
        <div style={{fontSize:9,color:T.text3}}>{label}</div>
      </div>)}
    </div>
    {months.every(m=>m.count===0)&&<div style={{textAlign:"center",fontSize:14,color:T.text3,marginTop:8}}>No models marked painted yet — update unit statuses to track progress!</div>}
  </div>);
}

// ── HOBBY BLOCKER ─────────────────────────────────────────────────────────────
// Randomly assigns one in-progress project as "today's pick" to encourage
// focused work. The pick is stored with today's date so it stays consistent
// if you reopen the app, but a Reroll button lets you pick again.
function todayKey(){return new Date().toISOString().slice(0,10)}

function pickRandomProject(projects,excludeId){
  const candidates=projects.filter(p=>{
    const s=getStats(p);
    if(!s.total)return false;
    const pct=Math.round(s.painted/s.total*100);
    return pct>0&&pct<100&&p.id!==excludeId;
  });
  if(!candidates.length){
    // fall back to any project with models that isn't 100% done
    const fallback=projects.filter(p=>{const s=getStats(p);return s.total>0&&s.painted<s.total&&p.id!==excludeId});
    if(!fallback.length)return null;
    return fallback[Math.floor(Math.random()*fallback.length)];
  }
  return candidates[Math.floor(Math.random()*candidates.length)];
}

function HobbyBlocker({data,onGoToProject}){
  const [pick,setPick]=useState(()=>lsLoad(SK_HOBBY,null));

  // Auto-pick if no pick exists for today
  useEffect(()=>{
    if(pick&&pick.date===todayKey()&&data.projects.some(p=>p.id===pick.projectId))return;
    const chosen=pickRandomProject(data.projects,null);
    if(chosen){
      const np={date:todayKey(),projectId:chosen.id};
      lsSave(SK_HOBBY,np);setPick(np);
    } else if(pick){
      lsSave(SK_HOBBY,null);setPick(null);
    }
  },[data.projects.length]);

  function reroll(){
    const chosen=pickRandomProject(data.projects,pick?.projectId);
    if(chosen){
      const np={date:todayKey(),projectId:chosen.id};
      lsSave(SK_HOBBY,np);setPick(np);
    }
  }

  const project=pick?data.projects.find(p=>p.id===pick.projectId):null;
  const eligibleCount=data.projects.filter(p=>{const s=getStats(p);return s.total>0&&s.painted<s.total}).length;

  if(eligibleCount===0)return null;

  const s=project?getStats(project):null;
  const pct=s&&s.total?Math.round(s.painted/s.total*100):0;

  return(<div style={{background:`linear-gradient(135deg, ${T.accentDim}, ${T.bg1})`,border:`1px solid ${T.accent}40`,borderRadius:16,padding:"16px 18px",marginBottom:14}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div style={{fontSize:14,color:T.accent,letterSpacing:"0.03em",textTransform:"uppercase",fontWeight:900}}>🎲 Hobby Blocker — Today's Pick</div>
      <button onClick={reroll} title="Pick a different project" style={{background:"none",border:`1px solid ${T.border}`,borderRadius:10,padding:"4px 9px",fontSize:14,color:T.text2,cursor:"pointer",fontFamily:"'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"}}>🔁 Reroll</button>
    </div>
    {project?<>
      <div onClick={()=>onGoToProject(project.id)} style={{cursor:"pointer"}}>
        <div style={{fontSize:17,fontWeight:900,color:T.text,marginBottom:2}}>{project.name}</div>
        {project.faction&&<div style={{fontSize:14,color:T.text3,marginBottom:8}}>{project.faction}</div>}
        <Bar stats={s}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:14,color:T.text2}}>
          <span>{s.painted}/{s.total} painted ({pct}%)</span>
          <span style={{color:T.accent,fontWeight:700}}>Open →</span>
        </div>
      </div>
    </>:<div style={{fontSize:14,color:T.text3,textAlign:"center",padding:"10px 0"}}>No in-progress projects to suggest.</div>}
  </div>);
}

// ── Paint Shopping List ───────────────────────────────────────────────────────
function ShoppingList({data,paints,onClose}){
  // Aggregate all "not owned" paints referenced in any recipe across all projects
  const needed=useMemo(()=>{
    const map={};
    data.projects.forEach(proj=>{
      (proj.recipes||[]).forEach(recipe=>{
        (recipe.steps||[]).forEach(step=>{
          if(!step.paint)return;
          const inLib=paints.find(p=>p.name===step.paint&&(!step.brand||p.brand===step.brand));
          if(inLib&&inLib.owned)return; // already owned
          const key=`${step.brand||""}|${step.type||""}|${step.paint}`;
          if(!map[key]){
            map[key]={name:step.paint,brand:step.brand||"",type:step.type||"",projects:new Set(),recipes:new Set()};
          }
          map[key].projects.add(proj.name);
          map[key].recipes.add(recipe.name);
        });
      });
    });
    return Object.values(map).map(e=>({...e,projects:[...e.projects],recipes:[...e.recipes]}))
      .sort((a,b)=>(a.brand+a.name).localeCompare(b.brand+b.name));
  },[data,paints]);

  // Group by brand
  const grouped=useMemo(()=>{
    const g={};
    needed.forEach(p=>{const k=p.brand||"Unknown Brand";if(!g[k])g[k]=[];g[k].push(p)});
    return g;
  },[needed]);

  return(<div style={{minHeight:"100dvh",background:T.bg0,color:T.text,fontFamily:"'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif",display:"flex",flexDirection:"column"}}>
    <div style={{borderBottom:`1px solid ${T.border}`,padding:`calc(14px + env(safe-area-inset-top)) 15px 13px`,display:"flex",alignItems:"center",gap:10,background:T.bg1,position:"sticky",top:0,zIndex:50}}>
      <button onClick={onClose} style={{background:"none",border:"none",color:T.text2,cursor:"pointer",fontSize:22,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:10}}>←</button>
      <div style={{flex:1}}>
        <div style={{fontSize:11,fontWeight:800,color:T.text3,letterSpacing:"0.12em",textTransform:"uppercase"}}>TABLETOP READY</div>
        <h1 style={{margin:0,fontSize:16,fontWeight:800,color:T.text}}>🛒 Paint Shopping List</h1>
      </div>
      <span style={{fontSize:13,color:T.red,fontWeight:700}}>{needed.length} paint{needed.length!==1?"s":""}</span>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"12px 15px 40px",maxWidth:680,margin:"0 auto",width:"100%"}}>
      {needed.length===0&&<div style={{textAlign:"center",padding:"60px 20px",color:T.text3}}>
        <div style={{fontSize:36,marginBottom:12}}>🎉</div>
        <div style={{fontSize:16,fontWeight:700,color:T.green,marginBottom:8}}>You own everything!</div>
        <div style={{fontSize:14}}>All paints used in your recipes are marked as owned. Add recipes with paints you need to buy to see them here.</div>
      </div>}
      {Object.entries(grouped).map(([brand,paints])=>(
        <div key={brand} style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:800,color:T.accent,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8,padding:"0 2px"}}>{brand}</div>
          <div style={{background:T.bg1,border:`1px solid ${T.border}`,borderRadius:16,overflow:"hidden"}}>
            {paints.map((p,i)=>(
              <div key={i} style={{padding:"12px 16px",borderBottom:i<paints.length-1?`1px solid ${T.border}`:"none"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:700,color:T.text}}>{p.name}</div>
                    {p.type&&<div style={{fontSize:12,color:T.text3,marginTop:1}}>{p.type}</div>}
                  </div>
                  <div style={{fontSize:11,color:T.text3,textAlign:"right",flexShrink:0}}>
                    {p.projects.slice(0,2).join(", ")}{p.projects.length>2&&` +${p.projects.length-2}`}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  </div>);
}

// ── Following Page ────────────────────────────────────────────────────────────
// Users can paste a shared dashboard link (or project share link) to follow
// someone's progress. Their latest shared snapshot is decoded and displayed.
function FollowingPage({onClose}){
  const [following,setFollowing]=useState(()=>lsLoad(SK_FOLLOWING,[]));
  const [addUrl,setAddUrl]=useState("");
  const [addError,setAddError]=useState("");
  const [viewing,setViewing]=useState(null); // {type:"dashboard"|"projects", payload}

  useEffect(()=>{lsSave(SK_FOLLOWING,following)},[following]);

  function addFollow(){
    const url=addUrl.trim();
    if(!url){setAddError("Paste a share link first.");return}
    // Try dashboard link
    const dhash=url.match(/#dashboard=([^&]+)/);
    if(dhash){
      const payload=decodeDashboardShare("#dashboard="+dhash[1]);
      if(payload){
        const label=payload.projects?.[0]?.name||"Unknown";
        setFollowing(f=>[...f.filter(x=>x.url!==url),{url,type:"dashboard",label:`${payload.projects?.length||0} projects`,ts:Date.now()}]);
        setAddUrl("");setAddError("");return;
      }
    }
    // Try project share link
    const phash=url.match(/#share=([^&]+)/);
    if(phash){
      const projects=decodeShare("#share="+phash[1]);
      if(projects){
        const label=projects.map(p=>p.name).join(", ");
        setFollowing(f=>[...f.filter(x=>x.url!==url),{url,type:"projects",label,ts:Date.now()}]);
        setAddUrl("");setAddError("");return;
      }
    }
    setAddError("Couldn't read that link — make sure it's a Tabletop Ready share link.");
  }

  function removeFollow(url){setFollowing(f=>f.filter(x=>x.url!==url))}

  function openFollow(entry){
    if(entry.type==="dashboard"){
      const hash=entry.url.match(/#dashboard=([^&]+)/);
      if(hash){const p=decodeDashboardShare("#dashboard="+hash[1]);if(p){setViewing({type:"dashboard",payload:p});return}}
    } else {
      const hash=entry.url.match(/#share=([^&]+)/);
      if(hash){const p=decodeShare("#share="+hash[1]);if(p){setViewing({type:"projects",payload:p});return}}
    }
  }

  if(viewing){
    if(viewing.type==="dashboard")return<SharedDashboard payload={viewing.payload} onBack={()=>setViewing(null)}/>;
    return<SharedView projects={viewing.payload} onAddToCollection={null} onBack={()=>setViewing(null)}/>;
  }

  return(<div style={{minHeight:"100dvh",background:T.bg0,color:T.text,fontFamily:"'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif",display:"flex",flexDirection:"column"}}>
    <div style={{borderBottom:`1px solid ${T.border}`,padding:`calc(14px + env(safe-area-inset-top)) 15px 13px`,display:"flex",alignItems:"center",gap:10,background:T.bg1,position:"sticky",top:0,zIndex:50}}>
      <button onClick={onClose} style={{background:"none",border:"none",color:T.text2,cursor:"pointer",fontSize:22,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:10}}>←</button>
      <div style={{flex:1}}>
        <div style={{fontSize:11,fontWeight:800,color:T.text3,letterSpacing:"0.12em",textTransform:"uppercase"}}>TABLETOP READY</div>
        <h1 style={{margin:0,fontSize:16,fontWeight:800,color:T.text}}>👥 Following</h1>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"12px 15px 40px",maxWidth:680,margin:"0 auto",width:"100%"}}>
      {/* Add new follow */}
      <div style={{background:T.bg1,border:`1px solid ${T.border}`,borderRadius:16,padding:"16px",marginBottom:16,marginTop:6}}>
        <div style={{fontSize:13,fontWeight:700,color:T.text3,letterSpacing:"0.05em",textTransform:"uppercase",marginBottom:10}}>Follow someone's collection</div>
        <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
          <input value={addUrl} onChange={e=>{setAddUrl(e.target.value);setAddError("")}} placeholder="Paste a share link here…" style={{...IS,flex:1,fontSize:13}} onKeyDown={e=>e.key==="Enter"&&addFollow()}/>
          <Btn sm onClick={addFollow} sx={{flexShrink:0,height:38}}>Follow</Btn>
        </div>
        {addError&&<div style={{fontSize:12,color:T.red,marginTop:6}}>{addError}</div>}
        <div style={{fontSize:12,color:T.text3,marginTop:8,lineHeight:1.6}}>Ask your friend to tap 🔗 Share on their Dashboard or a project, then paste that link here.</div>
      </div>

      {/* Following list */}
      {following.length===0&&<div style={{textAlign:"center",padding:"50px 20px",color:T.text3}}>
        <div style={{fontSize:32,marginBottom:12}}>👥</div>
        <div style={{fontSize:15,fontWeight:700,color:T.text,marginBottom:8}}>Not following anyone yet</div>
        <div style={{fontSize:14}}>Paste a friend's share link above to follow their hobby progress.</div>
      </div>}

      {following.map((entry,i)=>(
        <div key={i} onClick={()=>openFollow(entry)} style={{background:T.bg1,border:`1px solid ${T.border}`,borderRadius:16,padding:"14px 16px",marginBottom:10,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:700,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{entry.label}</div>
            <div style={{fontSize:12,color:T.text3,marginTop:2}}>
              {entry.type==="dashboard"?"Shared Dashboard":"Shared Project"} · Saved {new Date(entry.ts).toLocaleDateString()}
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
            <span style={{fontSize:12,color:T.accent,fontWeight:700}}>View →</span>
            <button onClick={e=>{e.stopPropagation();removeFollow(entry.url)}} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,padding:"4px 8px",fontSize:12,color:T.text3,cursor:"pointer",fontFamily:"inherit"}}>Remove</button>
          </div>
        </div>
      ))}
    </div>
  </div>);
}

// ══════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════════════════
function App(){
  const {session,signIn,signOut}=useAuth();
  const [skipLogin,setSkipLogin]=useState(()=>lsLoad("cq-skip-login",false));
  const [data,setData]=useState(()=>lsLoad(SK_DATA,DEFAULT_DATA));
  const {paints,addPaint,delPaint,toggleOwned,setPaints}=usePaints();
  const {log,addEntry,setLog}=usePaintLog();
  const [syncStatus,setSyncStatus]=useState("idle"); // idle|syncing|synced|error
  const [syncError,setSyncError]=useState(null);
  const [cloudLoaded,setCloudLoaded]=useState(false);
  const [screen,setScreen]=useState("dashboard"); // dashboard|projects|detail|paints|shopping|following
  const [activePid,setActivePid]=useState(null);
  const [tab,setTab]=useState("units");
  const [modal,setModal]=useState(null);
  const [recipeModal,setRecipeModal]=useState(null);
  const [paintingRecipe,setPaintingRecipe]=useState(null);
  const [shareTarget,setShareTarget]=useState(null);
  const [splitTarget,setSplitTarget]=useState(null);
  const [editTarget,setEditTarget]=useState(null);
  const [form,setForm]=useState({});
  const [filterStatus,setFilter]=useState("all");
  const [search,setSearch]=useState("");
  const [toast,setToast]=useState(null);
  const [showBackupBanner,setShowBackupBanner]=useState(false);

  useEffect(()=>{lsSave(SK_DATA,data)},[data]);

  // Backup reminder: check if 7+ days since last backup
  useEffect(()=>{
    const last=lsLoad(SK_BACKUP,null);
    if(!last)return;
    const days=(Date.now()-new Date(last).getTime())/(1000*60*60*24);
    if(days>=7)setShowBackupBanner(true);
  },[]);

  // ── CLOUD SYNC: on login, pull cloud data (merge if local has more) ──────────
  useEffect(()=>{
    if(!session?.token||cloudLoaded)return;
    (async()=>{
      setSyncStatus("syncing");
      const {data:cloud,error}=await cloudLoad(session.token);
      if(error){setSyncError(error);setSyncStatus("error");setCloudLoaded(true);return}
      if(cloud){
        if(cloud.projects&&cloud.projects.length>0){setData({projects:cloud.projects})}
        if(cloud.paints&&cloud.paints.length>0){setPaints(cloud.paints)}
        if(cloud.log&&cloud.log.length>0){setLog(cloud.log)}
      } else {
        const r=await cloudSave(session.token,{projects:data.projects,paints,log});
        if(!r.ok){setSyncError(r.error);setSyncStatus("error");setCloudLoaded(true);return}
      }
      setSyncError(null);
      setCloudLoaded(true);
      setSyncStatus("synced");
    })();
  },[session,cloudLoaded]);

  // ── CLOUD SYNC: debounced push on any change, once initial load is done ──────
  useEffect(()=>{
    if(!session?.token||!cloudLoaded)return;
    setSyncStatus("syncing");
    const t=setTimeout(async()=>{
      const r=await cloudSave(session.token,{projects:data.projects,paints,log});
      if(r.ok){setSyncError(null);setSyncStatus("synced")}else{setSyncError(r.error);setSyncStatus("error")}
    },1200);
    return ()=>clearTimeout(t);
  },[data,paints,log,session,cloudLoaded]);

  const showToast=(msg,color=T.green)=>{setToast({msg,color});setTimeout(()=>setToast(null),2600)};
  const nid=()=>Date.now()+Math.floor(Math.random()*999);
  const close=()=>{setModal(null);setForm({});setEditTarget(null)};
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const mut=fn=>setData(d=>({projects:fn(d.projects)}));

  const addProject=()=>{if(!form.name?.trim())return;mut(ps=>[...ps,{id:nid(),name:form.name.trim(),faction:form.faction?.trim()||"",units:[],recipes:[]}]);close()};
  const saveProject=()=>{mut(ps=>ps.map(p=>p.id===editTarget?{...p,name:form.name?.trim()||p.name,faction:form.faction?.trim()??p.faction}:p));close()};
  const delProject=id=>{mut(ps=>ps.filter(p=>p.id!==id));setScreen("projects")};
  const addUnit=()=>{if(!form.name?.trim())return;const u={id:nid(),name:form.name.trim(),models:parseInt(form.models)||1,status:form.status||"new_in_box",notes:form.notes||"",photos:form.photos||{before:null,wip:null,after:null},subgroups:null};mut(ps=>ps.map(p=>p.id===activePid?{...p,units:[...p.units,u]}:p));close()};
  const saveUnit=()=>{mut(ps=>ps.map(p=>p.id===activePid?{...p,units:p.units.map(u=>u.id===editTarget?{...u,name:form.name?.trim()||u.name,models:parseInt(form.models)||u.models,status:form.status||u.status,notes:form.notes??u.notes,photos:form.photos!==undefined?form.photos:(u.photos||{before:u.photo||null,wip:null,after:null}),subgroups:form.subgroups!==undefined?form.subgroups:u.subgroups}:u)}:p));close()};
  const delUnit=id=>mut(ps=>ps.map(p=>p.id===activePid?{...p,units:p.units.filter(u=>u.id!==id)}:p));

  const changeUnitStatus=(uid,newStatus)=>{
    const proj=data.projects.find(p=>p.id===activePid);
    const unit=proj?.units.find(u=>u.id===uid);
    if(unit){addEntry(proj.name,unit.name,unit.models,unit.status,newStatus)}
    mut(ps=>ps.map(p=>p.id===activePid?{...p,units:p.units.map(u=>u.id===uid?{...u,status:newStatus}:u)}:p));
    showToast(`${unit?.name} → ${SC[newStatus].label}`);
  };

  const saveRecipe=recipe=>{
    if(recipeModal?.mode==="add"){const r={...recipe,id:nid()};mut(ps=>ps.map(p=>p.id===activePid?{...p,recipes:[...(p.recipes||[]),r]}:p))}
    else{mut(ps=>ps.map(p=>p.id===activePid?{...p,recipes:(p.recipes||[]).map(r=>r.id===recipe.id?recipe:r)}:p))}
    setRecipeModal(null);
  };
  const delRecipe=id=>mut(ps=>ps.map(p=>p.id===activePid?{...p,recipes:(p.recipes||[]).filter(r=>r.id!==id)}:p));

  const handleImport=(projects,mode)=>{
    const rm=projects.map(p=>({...p,id:nid(),units:(p.units||[]).map(u=>({...u,id:nid()})),recipes:(p.recipes||[]).map(r=>({...r,id:nid()}))}));
    if(mode==="replace"){setData({projects:rm})}else{mut(ps=>[...ps,...rm])}
    showToast(`✓ Imported ${projects.length} project${projects.length!==1?"s":""}`);
  };

  function doBackup(){exportAll(data);lsSave(SK_BACKUP,new Date().toISOString());setShowBackupBanner(false);showToast("✓ Backup saved")}

  const project=data.projects.find(p=>p.id===activePid);
  const filteredUnits=project?.units.filter(u=>(filterStatus==="all"||u.status===filterStatus)&&(!search||u.name.toLowerCase().includes(search.toLowerCase())||(u.notes||"").toLowerCase().includes(search.toLowerCase())))||[];
  const shownProjects=data.projects.filter(p=>!search||p.name.toLowerCase().includes(search.toLowerCase())||(p.faction||"").toLowerCase().includes(search.toLowerCase())||p.units.some(u=>u.name.toLowerCase().includes(search.toLowerCase())));
  const goToProject=pid=>{setActivePid(pid);setScreen("detail");setSearch("");setTab("units")};

  // Auth gate: show login unless signed in or explicitly skipped
  if(session===undefined)return(<div style={{minHeight:"100dvh",background:T.bg0,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:T.accent,fontFamily:"monospace",fontSize:14,letterSpacing:"0.03em"}}>LOADING…</div></div>);
  if(!session&&!skipLogin)return<LoginScreen onSignIn={signIn} onSkip={()=>{lsSave("cq-skip-login",true);setSkipLogin(true)}}/>;

  if(screen==="paints")return<PaintLibrary paints={paints} addPaint={addPaint} delPaint={delPaint} toggleOwned={toggleOwned} onClose={()=>setScreen("projects")}/>;  
  if(screen==="shopping")return<ShoppingList data={data} paints={paints} onClose={()=>setScreen("projects")}/>;  
  if(screen==="following")return<FollowingPage onClose={()=>setScreen("dashboard")}/>;
  if(screen==="account")return<AccountScreen session={session} syncStatus={syncStatus} syncError={syncError} onSignOut={()=>{signOut();setScreen("projects")}} onClose={()=>setScreen("projects")}/>;

  const hdrTitle = screen==="detail"&&project ? project.name : null;
  const hdrSub   = screen==="detail"&&project ? (project.faction||"") : null;

  // ⋯ Settings menu items per screen
  const menuItems = [];
  if(screen==="dashboard"){
    menuItems.push({label:"Share Dashboard",icon:"🔗",action:()=>setModal("shareDashboard")});
    menuItems.push({label:"Export CSV",icon:"📄",action:()=>exportCSV(data)});
    menuItems.push({label:"Export All (.mrp)",icon:"💾",action:doBackup});
  }
  if(screen==="projects"){
    menuItems.push({label:"Import Projects",icon:"📂",action:()=>setModal("import")});
    menuItems.push({label:"Export All (.mrp)",icon:"💾",action:doBackup});
    menuItems.push({label:"Export CSV",icon:"📄",action:()=>exportCSV(data)});
    menuItems.push({label:"Paint Shopping List",icon:"🛒",action:()=>setScreen("shopping")});
  }
  if(screen==="detail"&&project){
    menuItems.push({label:"Share Project",icon:"🔗",action:()=>setShareTarget(project)});
    menuItems.push({label:"Export Project (.mrp)",icon:"💾",action:()=>{exportProject(project);showToast("✓ Exported")}});
    menuItems.push({label:"Edit Project",icon:"✏️",action:()=>{setForm({name:project.name,faction:project.faction});setEditTarget(activePid);setModal("editProject")}});
  }

  return(<div style={{minHeight:"100dvh",background:T.bg0,color:T.text,fontFamily:"'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif",display:"flex",flexDirection:"column"}}>

    {toast&&<div style={{position:"fixed",top:"calc(16px + env(safe-area-inset-top))",left:"50%",transform:"translateX(-50%)",background:T.bg1,border:`1px solid ${toast.color}50`,borderRadius:14,padding:"10px 18px",fontSize:14,fontWeight:700,color:toast.color,zIndex:999,boxShadow:"0 8px 32px rgba(0,0,0,0.12)",whiteSpace:"nowrap",pointerEvents:"none"}}>{toast.msg}</div>}

    {/* Session expired inline banner */}
    {!session&&skipLogin&&<SessionExpiredBanner onSignIn={()=>{lsSave("cq-skip-login",false);setSkipLogin(false)}}/>}

    {/* ── Sticky header shell ── */}
    <div style={{position:"sticky",top:0,zIndex:50,background:T.bg1,borderBottom:`1px solid ${T.border}`,flexShrink:0,boxShadow:"0 1px 0 rgba(0,0,0,0.04)"}}>

      {/* Row 1: brand bar */}
      <div style={{padding:`calc(env(safe-area-inset-top) + 12px) 16px 12px`,display:"flex",alignItems:"center",minHeight:52}}>
        {/* Left: back arrow in detail, spacer otherwise */}
        <div style={{width:36,flexShrink:0}}>
          {screen==="detail"&&<button onClick={()=>{setScreen("projects");setActivePid(null);setFilter("all");setSearch("")}} style={{background:"none",border:"none",color:T.text2,cursor:"pointer",width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:10,fontSize:20}}>←</button>}
        </div>

        {/* Centre: app name always, project name below when in detail */}
        <div style={{flex:1,textAlign:"center",minWidth:0}}>
          <div style={{fontSize:11,fontWeight:800,color:T.text3,letterSpacing:"0.12em",textTransform:"uppercase",lineHeight:1}}>TABLETOP READY</div>
          {hdrTitle&&<div style={{fontSize:16,fontWeight:800,color:T.text,marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%",lineHeight:1.15}}>{hdrTitle}</div>}
          {hdrSub&&<div style={{fontSize:12,color:T.text3,marginTop:1}}>{hdrSub}</div>}
        </div>

        {/* Right: account icon + sync dot, then ⋯ menu */}
        <div style={{width:72,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4}}>
          {/* Account / sync */}
          <button onClick={()=>setScreen("account")} title="Account & Sync" style={{background:"none",border:"none",cursor:"pointer",padding:0,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",borderRadius:8}}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={T.text2} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            {/* Sync dot */}
            <span style={{position:"absolute",top:3,right:3,width:8,height:8,borderRadius:"50%",background:syncStatus==="synced"?T.green:syncStatus==="syncing"?T.blue:syncStatus==="error"?T.red:"transparent",border:`2px solid ${T.bg1}`,display:"block"}}/>
          </button>
          {/* ⋯ menu */}
          <SettingsMenu items={menuItems}
            primaryAction={
              screen==="projects"?{label:"+ Project",action:()=>{setModal("addProject");setForm({})}}
              :screen==="detail"&&tab==="units"?{label:"+ Unit",action:()=>{setModal("addUnit");setForm({status:"new_in_box",models:"1"})}}
              :screen==="detail"&&tab==="recipes"?{label:"+ Recipe",action:()=>setRecipeModal({recipe:null,mode:"add"})}
              :null
            }
          />
        </div>
      </div>

      {/* Row 2: search bar (projects + detail only) */}
      {(screen==="projects"||screen==="detail")&&<div style={{padding:"0 14px 10px"}}>
        <div style={{position:"relative"}}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={T.text3} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)"}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder={screen==="projects"?"Search projects…":"Search units or notes…"}
            style={{...IS,paddingLeft:33,paddingTop:"8px",paddingBottom:"8px",borderRadius:10,fontSize:14,background:T.bg2,border:`1px solid ${T.border}`}}
          />
          {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:T.text3,cursor:"pointer",fontSize:18,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>}
        </div>
      </div>}

    </div>{/* end sticky header shell */}

    {/* Backup banner */}
    {showBackupBanner&&screen!=="detail"&&<BackupBanner onExport={doBackup} onDismiss={()=>setShowBackupBanner(false)}/>}

    {/* Content */}
    <div style={{flex:1,overflowY:"auto"}}>
      {screen==="dashboard"&&<Dashboard data={data} log={log} onGoToProject={goToProject}/>}

      {screen==="projects"&&<div style={{padding:"12px 15px",maxWidth:680,margin:"0 auto",paddingBottom:"calc(80px + env(safe-area-inset-bottom))"}}>
        {(()=>{const g={painted:0,built:0,unpainted:0,new_in_box:0,total:0};data.projects.forEach(p=>{const s=getStats(p);Object.keys(g).forEach(k=>g[k]+=s[k])});return(<div style={{background:T.bg1,border:`1px solid ${T.border}`,borderRadius:16,padding:"14px 17px",marginBottom:14,marginTop:6}}><div style={{fontSize:14,color:T.text3,letterSpacing:"0.03em",textTransform:"uppercase",marginBottom:7,fontWeight:700}}>Collection — {g.total} models · {data.projects.length} project{data.projects.length!==1?"s":""}</div><Bar stats={g}/><div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:7}}>{Object.entries(SC).map(([k,c])=><div key={k} style={{fontSize:13,background:c.bg,color:c.color,fontWeight:700,borderRadius:20,padding:"4px 11px",display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:14}}>{c.icon}</span>{g[k]}</div>)}</div></div>)})()}
        {shownProjects.length===0&&<div style={{textAlign:"center",color:T.text3,padding:"50px 0",fontSize:14}}>{search?"No projects match.":"No projects yet!"}</div>}
        {shownProjects.map(p=>{const s=getStats(p);return(<div key={p.id} onClick={()=>goToProject(p.id)} style={{background:T.bg1,border:`1px solid ${T.border}`,borderRadius:16,padding:"16px 18px",marginBottom:10,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{fontWeight:800,fontSize:15,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                {s.total>0&&s.painted===s.total&&<span style={{fontSize:12,background:T.green+"18",color:T.green,border:`1px solid ${T.green}30`,borderRadius:20,padding:"2px 8px",fontWeight:700,flexShrink:0}}>✓ Complete</span>}
              </div>
              {p.faction&&<div style={{fontSize:14,color:T.text3,marginTop:2}}>{p.faction}</div>}
            </div>
            <div style={{textAlign:"right",flexShrink:0,marginLeft:10}}><div style={{fontWeight:700,color:T.accent,fontSize:22,lineHeight:1}}>{s.total}</div><div style={{fontSize:14,color:T.text3}}>models</div></div>
          </div>
          <Bar stats={s}/><div style={{display:"flex",gap:9,flexWrap:"wrap",marginTop:5}}>{Object.entries(SC).map(([k,c])=>s[k]>0&&<span key={k} style={{fontSize:14,color:c.color}}>{c.icon} {s[k]} {c.label}</span>)}</div>
          <div style={{marginTop:7,fontSize:14,color:T.text3}}>{p.units.length} unit{p.units.length!==1?"s":""} · {(p.recipes||[]).length} recipe{(p.recipes||[]).length!==1?"s":""} → tap to open</div>
        </div>)})}
      </div>}

      {screen==="detail"&&project&&<div style={{padding:"12px 15px",maxWidth:680,margin:"0 auto",paddingBottom:"calc(80px + env(safe-area-inset-bottom))"}}>
        {(()=>{const s=getStats(project);return(<div style={{background:T.bg1,border:`1px solid ${T.border}`,borderRadius:16,padding:"14px 17px",marginBottom:13,marginTop:6}}><div style={{fontSize:14,color:T.text3,letterSpacing:"0.03em",textTransform:"uppercase",marginBottom:5,fontWeight:700}}>{s.total} models · {project.units.length} units · {(project.recipes||[]).length} recipes</div><Bar stats={s}/><div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:6}}>{Object.entries(SC).map(([k,c])=><div key={k} style={{fontSize:13,background:c.bg,color:c.color,fontWeight:700,borderRadius:20,padding:"4px 11px",display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:14}}>{c.icon}</span>{s[k]}</div>)}</div></div>)})()}
        <TabBar tabs={[{id:"units",label:`Units (${project.units.length})`},{id:"recipes",label:`Recipes (${(project.recipes||[]).length})`},{id:"showcase",label:"Showcase"}]} active={tab} onChange={setTab}/>

        {tab==="units"&&<>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>{[["all","All"],...Object.entries(SC).map(([k,v])=>[k,v.label])].map(([k,label])=>(<button key={k} onClick={()=>setFilter(k)} style={{background:filterStatus===k?T.accentDim:"transparent",border:`1px solid ${filterStatus===k?T.accent:T.border}`,borderRadius:20,padding:"4px 11px",cursor:"pointer",color:filterStatus===k?T.accent:T.text3,fontSize:14,fontWeight:700,letterSpacing:"0.02em",textTransform:"uppercase",fontFamily:"'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"}}>{label}</button>))}</div>
          <div style={{fontSize:14,color:T.text3,marginBottom:10,paddingLeft:2}}>Tap a status badge to cycle · Hold to split unit</div>
          {filteredUnits.length===0&&<div style={{textAlign:"center",color:T.text3,padding:"40px 0",fontSize:14}}>{project.units.length===0?"No units yet.":"No units match."}</div>}
          {filteredUnits.map(u=><UnitCard key={u.id} unit={u} onEdit={u=>{setEditTarget(u.id);setForm({name:u.name,models:String(u.models),status:u.status,notes:u.notes||"",photo:u.photo||null,subgroups:u.subgroups});setModal("editUnit")}} onDelete={delUnit} onStatusChange={changeUnitStatus} onSplit={u=>setSplitTarget(u)}/>)}
        </>}

        {tab==="recipes"&&<>
          {(project.recipes||[]).length===0&&<div style={{textAlign:"center",color:T.text3,padding:"40px 0",fontSize:14}}>No paint recipes yet.<br/>Tap + Recipe to add your first.</div>}
          {(project.recipes||[]).map(r=><RecipeCard key={r.id} recipe={r} onEdit={r=>setRecipeModal({recipe:r,mode:"edit"})} onDelete={delRecipe} onStartPainting={r=>setPaintingRecipe(r)}/>)}
        </>}

        {tab==="showcase"&&<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {project.units.filter(u=>u.photo).map(u=>(<div key={u.id} style={{borderRadius:16,overflow:"hidden",position:"relative",border:`1px solid ${T.border}`}}><img src={u.photo} alt={u.name} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}}/><div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.75))",padding:"24px 10px 8px"}}><div style={{fontSize:14,fontWeight:800,color:"#fff"}}>{u.name}</div><div style={{marginTop:3}}><Badge status={u.status}/></div></div></div>))}
          </div>
          {project.units.filter(u=>u.photo).length===0&&<div style={{textAlign:"center",color:T.text3,padding:"50px 0",fontSize:14}}>No photos yet — add photos to units to see them here.</div>}
        </>}

        <div style={{marginTop:28,borderTop:`1px solid ${T.border}`,paddingTop:14}}><Btn v="del" sm onClick={()=>{if(window.confirm("Delete this project and all its data?"))delProject(project.id)}}>🗑 Delete Project</Btn></div>
      </div>}
    </div>

    {/* Bottom Nav */}
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:T.bg0,borderTop:`1px solid ${T.border}`,display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom)"}}>
      {[{id:"dashboard",icon:"📊",label:"Dashboard"},{id:"projects",icon:"⚔️",label:"Projects"},{id:"following",icon:"👥",label:"Following"},{id:"paints",icon:"🎨",label:"Paints"}].map(({id,icon,label})=>{
        const active=screen===id||(screen==="detail"&&id==="projects");
        return(<button key={id} onClick={()=>{if(id==="projects"&&screen==="detail"){setScreen("projects");setActivePid(null);setFilter("all");setSearch("")}else{setScreen(id)}}} style={{flex:1,padding:"10px 8px 9px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,WebkitTapHighlightColor:"transparent",opacity:active?1:0.45}}>
          <span style={{fontSize:19}}>{icon}</span>
          <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.03em",textTransform:"uppercase",color:active?T.accent:T.text3,fontFamily:"'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"}}>{label}</span>
          {active&&<div style={{width:18,height:2,borderRadius:1,background:T.accent,marginTop:1}}/>}
        </button>);
      })}
    </div>

    {/* Modals & Overlays */}
    {paintingRecipe&&<PaintingMode recipe={paintingRecipe} onClose={()=>setPaintingRecipe(null)} paints={paints}/>}
    {shareTarget&&<ShareModal project={shareTarget} onClose={()=>setShareTarget(null)}/>}
    {modal==="shareDashboard"&&<ShareDashboardModal data={data} onClose={close}/>}
    {splitTarget&&<SplitModal unit={splitTarget} onSave={u=>{setEditTarget(u.id);mut(ps=>ps.map(p=>p.id===activePid?{...p,units:p.units.map(x=>x.id===u.id?u:x)}:p))}} onClose={()=>setSplitTarget(null)}/>}
    {modal==="import"&&<ImportModal onClose={close} onImport={handleImport}/>}
    {modal==="addProject"&&<Modal title="New Project" onClose={close}><Inp label="Project Name" placeholder="e.g. Orks Waaagh!" value={form.name||""} onChange={e=>sf("name",e.target.value)} autoFocus/><Inp label="Faction / Army" placeholder="e.g. Orks, Space Marines…" value={form.faction||""} onChange={e=>sf("faction",e.target.value)}/><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}><Btn v="sec" sm onClick={close}>Cancel</Btn><Btn sm onClick={addProject}>Create</Btn></div></Modal>}
    {modal==="editProject"&&<Modal title="Edit Project" onClose={close}><Inp label="Project Name" value={form.name||""} onChange={e=>sf("name",e.target.value)} autoFocus/><Inp label="Faction / Army" value={form.faction||""} onChange={e=>sf("faction",e.target.value)}/><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}><Btn v="sec" sm onClick={close}>Cancel</Btn><Btn sm onClick={saveProject}>Save</Btn></div></Modal>}
    {(modal==="addUnit"||modal==="editUnit")&&<Modal title={modal==="addUnit"?"Add Unit":"Edit Unit"} onClose={close} wide><Inp label="Unit Name" placeholder="e.g. Boyz Squad, Terminators…" value={form.name||""} onChange={e=>sf("name",e.target.value)} autoFocus/><Inp label="Number of Models" type="number" min="1" value={form.models||"1"} onChange={e=>sf("models",e.target.value)}/><Sel label="Status" value={form.status||"new_in_box"} onChange={e=>sf("status",e.target.value)}>{Object.entries(SC).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}</Sel><Txt label="Notes" placeholder="Assembly notes, colour cues, WIP ideas…" value={form.notes||""} onChange={e=>sf("notes",e.target.value)}/><MultiPhotoUpload photos={form.photos||{before:null,wip:null,after:null}} onChange={v=>sf("photos",v)}/><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><Btn v="sec" sm onClick={close}>Cancel</Btn><Btn sm onClick={modal==="addUnit"?addUnit:saveUnit}>{modal==="addUnit"?"Add Unit":"Save"}</Btn></div></Modal>}
    {recipeModal&&<RecipeModal recipe={recipeModal.recipe} onSave={saveRecipe} onClose={()=>setRecipeModal(null)} paints={paints} addPaint={addPaint}/>}
  </div>);
}

function Root(){
  const hash=window.location.hash;
  if(hash.startsWith("#dashboard=")){const d=decodeDashboardShare(hash);if(d)return<SharedDashboard payload={d}/>}
  if(hash.startsWith("#share=")){const p=decodeShare(hash);if(p)return<SharedView projects={p} onAddToCollection={null}/>}
  return<App/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
