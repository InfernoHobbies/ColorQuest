function decodeShare(hash){try{const b64=hash.replace(/^#share=/,"");const p=JSON.parse(decodeURIComponent(escape(atob(b64))));return p._mrp&&p.projects?p.projects:null}catch{return null}}

// Dashboard share: a lightweight summary (no units/photos/recipes) so the
// URL stays small even with many projects.
function encodeDashboardShare(data){
  try{
    const summary=data.projects.map(p=>{const s=getStats(p);return{name:p.name,faction:p.faction||"",stats:s}});
    return btoa(unescape(encodeURIComponent(JSON.stringify({_cqd:1,ts:Date.now(),projects:summary}))));
  }catch{return null}
}
function decodeDashboardShare(hash){
  try{
    const b64=hash.replace(/^#dashboard=/,"");

// ── GOOGLE DRIVE SYNC ─────────────────────────────────────────────────────────
// App data is stored as a single JSON file in the user's hidden "appDataFolder"
// on Google Drive — only this app can see/access it, the user never sees it
// cluttering their normal Drive.

const DRIVE_API="https://www.googleapis.com/drive/v3";
const DRIVE_UPLOAD_API="https://www.googleapis.com/upload/drive/v3";

async function driveFindFileId(token){
  const res=await fetch(`${DRIVE_API}/files?spaces=appDataFolder&q=name='${DRIVE_FILE_NAME}'&fields=files(id,name)`,{
    headers:{Authorization:`Bearer ${token}`}
  });
  if(!res.ok)throw new Error("Drive list failed: "+res.status);
  const json=await res.json();
  return json.files&&json.files.length?json.files[0].id:null;
}

async function cloudLoad(token){
  try{
    const fileId=await driveFindFileId(token);
    if(!fileId)return {data:null};
    const res=await fetch(`${DRIVE_API}/files/${fileId}?alt=media`,{headers:{Authorization:`Bearer ${token}`}});
    if(!res.ok){const txt=await res.text();console.error("cloudLoad HTTP",res.status,txt);return{data:null,error:`Load failed (${res.status})`}}
    return {data:await res.json()};
  }catch(e){console.error("cloudLoad error",e);return{data:null,error:e.message}}
}

async function cloudSave(token,payload){
  try{
    const fileId=await driveFindFileId(token);
    const body=JSON.stringify(payload);
    if(fileId){
      const res=await fetch(`${DRIVE_UPLOAD_API}/files/${fileId}?uploadType=media`,{
        method:"PATCH",
        headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},
        body
      });
      if(!res.ok){const txt=await res.text();console.error("cloudSave PATCH HTTP",res.status,txt);return{ok:false,error:`Save failed (${res.status}): ${txt.slice(0,120)}`}}
      return{ok:true};
    } else {
      const metadata={name:DRIVE_FILE_NAME,parents:["appDataFolder"]};
      const form=new FormData();
      form.append("metadata",new Blob([JSON.stringify(metadata)],{type:"application/json"}));
      form.append("file",new Blob([body],{type:"application/json"}));
      const res=await fetch(`${DRIVE_UPLOAD_API}/files?uploadType=multipart`,{
        method:"POST",
        headers:{Authorization:`Bearer ${token}`},
        body:form
      });
      if(!res.ok){const txt=await res.text();console.error("cloudSave POST HTTP",res.status,txt);return{ok:false,error:`Save failed (${res.status}): ${txt.slice(0,120)}`}}
      return{ok:true};
    }
  }catch(e){console.error("cloudSave error",e);return{ok:false,error:e.message}}
}

async function fetchUserEmail(token){
  try{
    const res=await fetch("https://www.googleapis.com/oauth2/v2/userinfo",{headers:{Authorization:`Bearer ${token}`}});
    if(!res.ok)return null;
    const json=await res.json();
    return json.email||null;
  }catch{return null}
}

// ── AUTH HOOK ─────────────────────────────────────────────────────────────────
// session: undefined=loading, null=signed out, {token,email}=signed in
function useAuth(){
  const [session,setSession]=useState(undefined);
  const tokenClientRef=useRef(null);

  useEffect(()=>{
    // Try restoring a previously stored token (valid for ~1hr from issue)
    const stored=lsLoad(TOKEN_KEY,null);
    if(stored&&stored.expiresAt>Date.now()){
      setSession({token:stored.token,email:stored.email});
    } else {
      lsSave(TOKEN_KEY,null);
      setSession(null);
    }
  },[]);

  // Initialize Google token client once the GSI script is ready
  useEffect(()=>{
    let tries=0;
    const init=()=>{
      if(window.google&&window.google.accounts&&window.google.accounts.oauth2){
        tokenClientRef.current=window.google.accounts.oauth2.initTokenClient({
          client_id:GOOGLE_CLIENT_ID,
          scope:DRIVE_SCOPE,
          callback:async(resp)=>{
            if(resp.error){console.error("Google auth error",resp);return}
            const token=resp.access_token;
            const expiresAt=Date.now()+(resp.expires_in||3600)*1000-60000;
            const email=await fetchUserEmail(token);
            const sess={token,email,expiresAt};
            lsSave(TOKEN_KEY,sess);
            setSession({token,email});
          }
        });
      } else if(tries<50){
        tries++;setTimeout(init,100);
      }
    };
    init();
  },[]);

  const signIn=useCallback(()=>{
    if(tokenClientRef.current)tokenClientRef.current.requestAccessToken({prompt:"consent"});
  },[]);

  const signOut=useCallback(()=>{
    const stored=lsLoad(TOKEN_KEY,null);
    if(stored&&stored.token&&window.google?.accounts?.oauth2){
      window.google.accounts.oauth2.revoke(stored.token,()=>{});
    }
    lsSave(TOKEN_KEY,null);
    setSession(null);
  },[]);

  return{session,signIn,signOut};
}

  new_in_box:{label:"New in Box",color:T.accent,bg:"rgba(124,77,204,0.14)",icon:"📦"},
};
const STATUS_ORDER=["new_in_box","unpainted","built","painted"];

const getStats=p=>{const s={painted:0,built:0,unpainted:0,new_in_box:0,total:0};p.units.forEach(u=>{s[u.status]+=u.models;s.total+=u.models});return s};
function exportCSV(data){const rows=[["Project","Faction","Unit","Models","Status","Notes"]];data.projects.forEach(p=>p.units.forEach(u=>rows.push([p.name,p.faction||"",u.name,u.models,SC[u.status].label,(u.notes||"").replace(/\n/g," | ")])));const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="colorquest.csv";a.click()}
function dlJSON(obj,fn){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(obj,null,2)],{type:"application/json"}));a.download=fn;a.click()}
function exportProject(p){dlJSON({_mrp:MRP,exported:new Date().toISOString(),project:p},p.name.replace(/[^a-z0-9]/gi,"_")+".mrp")}
function exportAll(d){dlJSON({_mrp:MRP,exported:new Date().toISOString(),projects:d.projects},"colorquest-backup.mrp")}
function toBase64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f)})}
function readText(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsText(f)})}
async function parseImport(file){try{const p=JSON.parse(await readText(file));if(!p._mrp)return{ok:false,error:"Not a valid .mrp file."};const raw=p.projects?p.projects:p.project?[p.project]:null;if(!raw?.length)return{ok:false,error:"No projects found."};for(const x of raw)if(!x.name||!Array.isArray(x.units))return{ok:false,error:"Invalid data."};return{ok:true,projects:raw}}catch{return{ok:false,error:"Could not read file."}}}

// ── Paint hooks ───────────────────────────────────────────────────────────────
function usePaints(){
  const [paints,setPaints]=useState(()=>lsLoad(SK_PAINTS,DEFAULT_PAINTS));
  useEffect(()=>{lsSave(SK_PAINTS,paints)},[paints]);
  const addPaint=p=>{const np={...p,id:"p"+Date.now(),owned:p.owned!==undefined?p.owned:true};setPaints(ps=>[...ps,np]);return np};
  const delPaint=id=>setPaints(ps=>ps.filter(p=>p.id!==id));
  const toggleOwned=id=>setPaints(ps=>ps.map(p=>p.id===id?{...p,owned:!p.owned}:p));
  return{paints,addPaint,delPaint,toggleOwned,setPaints};
}

// ── Paint picker ──────────────────────────────────────────────────────────────
function PaintPicker({step,onChange,paints,addPaint}){
  const brands=useMemo(()=>[...new Set(paints.map(p=>p.brand))].sort(),[paints]);
  const typesForBrand=useMemo(()=>{if(!step.brand)return[...new Set(paints.map(p=>p.type))].sort();return[...new Set(paints.filter(p=>p.brand===step.brand).map(p=>p.type))].sort()},[paints,step.brand]);
  const paintsForSelection=useMemo(()=>paints.filter(p=>(!step.brand||p.brand===step.brand)&&(!step.type||p.type===step.type)).sort((a,b)=>a.name.localeCompare(b.name)),[paints,step.brand,step.type]);
  const inLibrary=useMemo(()=>!!step.paint&&paints.some(p=>p.name.toLowerCase()===step.paint.toLowerCase()&&(!step.brand||p.brand===step.brand)&&(!step.type||p.type===step.type)),[paints,step]);
  const selectedPaint=useMemo(()=>paints.find(p=>p.name===step.paint&&(!step.brand||p.brand===step.brand)),[paints,step]);
  const [savingNew,setSavingNew]=useState(false);
  const [newName,setNewName]=useState("");
  function handleSaveNew(){if(!newName.trim())return;addPaint({brand:step.brand||"Unknown",type:step.type||"Unknown",name:newName.trim(),owned:true});onChange({...step,paint:newName.trim()});setSavingNew(false);setNewName("")}
  const ss={...IS,padding:"8px 10px",fontSize:13};
  return(<div style={{display:"flex",flexDirection:"column",gap:6}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
      <div><label style={{...LS,marginBottom:3}}>Brand</label><select value={step.brand||""} onChange={e=>{onChange({...step,brand:e.target.value,type:"",paint:""})}} style={ss}><option value="">All brands</option>{brands.map(b=><option key={b} value={b}>{b}</option>)}</select></div>
      <div><label style={{...LS,marginBottom:3}}>Type</label><select value={step.type||""} onChange={e=>{onChange({...step,type:e.target.value,paint:""})}} style={ss}><option value="">All types</option>{typesForBrand.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
    </div>
    <div>
      <label style={{...LS,marginBottom:3}}>Paint {selectedPaint&&<span style={{fontWeight:400,textTransform:"none",letterSpacing:0,color:selectedPaint.owned?T.green:T.red}}>{selectedPaint.owned?"● owned":"○ need to buy"}</span>}</label>
      <select value={step.paint||""} onChange={e=>onChange({...step,paint:e.target.value})} style={ss}><option value="">— Select paint —</option>{paintsForSelection.map(p=><option key={p.id} value={p.name}>{p.name}{p.owned===false?" ○":""}</option>)}</select>
    </div>
    {step.paint&&!inLibrary&&!savingNew&&(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:T.yellow+"18",border:`1px solid ${T.yellow}35`,borderRadius:6,padding:"7px 10px"}}><span style={{fontSize:12,color:T.yellow}}>"{step.paint}" not in library</span><Btn sm v="ok" onClick={()=>{setSavingNew(true);setNewName(step.paint)}}>+ Save</Btn></div>)}
    {!step.paint&&!savingNew&&(<button onClick={()=>setSavingNew(true)} style={{background:"none",border:`1px dashed ${T.border2}`,borderRadius:6,padding:"7px 10px",fontSize:12,color:T.text3,cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>+ Type a paint not in the list…</button>)}
    {savingNew&&(<div style={{background:T.bg1,border:`1px solid ${T.border}`,borderRadius:7,padding:"10px 12px"}}><div style={{fontSize:11,color:T.text2,fontWeight:700,marginBottom:7,letterSpacing:"0.05em",textTransform:"uppercase"}}>Add paint to library</div><input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Paint name…" style={{...IS,marginBottom:7,fontSize:13}} autoFocus/>{!step.brand&&<input value={step.brand||""} onChange={e=>onChange({...step,brand:e.target.value})} placeholder="Brand (e.g. Citadel)…" style={{...IS,marginBottom:7,fontSize:13}}/>}{!step.type&&<input value={step.type||""} onChange={e=>onChange({...step,type:e.target.value})} placeholder="Type (e.g. Base, Shade)…" style={{...IS,marginBottom:7,fontSize:13}}/>}<div style={{display:"flex",gap:7}}><Btn sm v="sec" onClick={()=>{setSavingNew(false);setNewName("")}}>Cancel</Btn><Btn sm v="ok" onClick={handleSaveNew}>Save to Library</Btn></div></div>)}
  </div>);
}

// ── Step builder ──────────────────────────────────────────────────────────────
function newStep(){return{phase:"Base",paint:"",brand:"",type:"",notes:""}}
function StepRow({step,idx,onChange,onDelete,paints,addPaint}){
  const col=STEP_COLS[idx%STEP_COLS.length];
  return(<div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:9,padding:"12px 13px",marginBottom:8}}>
    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
      <div style={{width:22,height:22,borderRadius:5,background:col+"25",border:`1px solid ${col}60`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,color:col,flexShrink:0}}>{idx+1}</div>
      <div style={{flex:1}}><label style={{...LS,marginBottom:3}}>Phase</label><select value={step.phase} onChange={e=>onChange({...step,phase:e.target.value})} style={{...IS,padding:"6px 9px",fontSize:13}}>{PHASES.map(ph=><option key={ph} value={ph}>{ph}</option>)}</select></div>
      <button onClick={onDelete} style={{background:"none",border:"none",color:T.text3,cursor:"pointer",fontSize:18,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:18}}>×</button>
    </div>
    <PaintPicker step={step} onChange={onChange} paints={paints} addPaint={addPaint}/>
    <div style={{marginTop:8}}><label style={{...LS,marginBottom:3}}>Notes</label><input value={step.notes} onChange={e=>onChange({...step,notes:e.target.value})} placeholder="e.g. thin 1:1, edge only…" style={{...IS,fontSize:12,padding:"7px 10px"}}/></div>
  </div>);
}

    </div>}

// ── Recipe editor ─────────────────────────────────────────────────────────────
function RecipeModal({recipe,onSave,onClose,paints,addPaint}){
  const [name,setName]=useState(recipe?.name||"");
  const [steps,setSteps]=useState(()=>recipe?.steps?.length?recipe.steps.map(s=>({...s})):[newStep()]);
  function updateStep(i,s){setSteps(ss=>ss.map((x,j)=>j===i?s:x))}
  function removeStep(i){setSteps(ss=>ss.filter((_,j)=>j!==i))}
  function moveStep(i,dir){setSteps(ss=>{const a=[...ss];const b=a[i];a[i]=a[i+dir];a[i+dir]=b;return a})}
  function save(){if(!name.trim())return;onSave({...(recipe||{}),name:name.trim(),steps})}
  return(<Modal title={recipe?"Edit Recipe":"New Recipe"} onClose={onClose} wide>
    <Inp label="Recipe Name" placeholder="e.g. Skin, Armour, Basing…" value={name} onChange={e=>setName(e.target.value)} autoFocus/>
    <div style={{marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><label style={LS}>Steps</label><Btn sm v="blue" onClick={()=>setSteps(ss=>[...ss,newStep()])}>+ Add Step</Btn></div>
      {steps.map((step,i)=>(<div key={i}><StepRow step={step} idx={i} onChange={s=>updateStep(i,s)} onDelete={()=>removeStep(i)} paints={paints} addPaint={addPaint}/>{steps.length>1&&<div style={{display:"flex",gap:6,marginTop:-4,marginBottom:8,paddingLeft:30}}>{i>0&&<button onClick={()=>moveStep(i,-1)} style={{background:"none",border:"none",color:T.text3,cursor:"pointer",fontSize:11,padding:0}}>↑ Move up</button>}{i<steps.length-1&&<button onClick={()=>moveStep(i,1)} style={{background:"none",border:"none",color:T.text3,cursor:"pointer",fontSize:11,padding:0}}>↓ Move down</button>}</div>}</div>))}
      {steps.length===0&&<div style={{textAlign:"center",padding:"16px 0",color:T.text3,fontSize:13}}>No steps yet</div>}
    </div>
    <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><Btn v="sec" sm onClick={onClose}>Cancel</Btn><Btn sm onClick={save}>{recipe?"Save Changes":"Add Recipe"}</Btn></div>
  </Modal>);
}

// ── ▶ PAINTING MODE (fullscreen step-by-step guide) ───────────────────────────
function PaintingMode({recipe,onClose,paints}){
  const steps=recipe.steps||[];
  const [idx,setIdx]=useState(0);
  const [done,setDone]=useState(new Set());
  const step=steps[idx];
  const col=STEP_COLS[idx%STEP_COLS.length];
  const allDone=done.size===steps.length;
  const selectedPaint=useMemo(()=>step&&paints.find(p=>p.name===step.paint&&(!step.brand||p.brand===step.brand)),[paints,step]);

  if(steps.length===0)return null;

  function markDone(){setDone(d=>new Set([...d,idx]));if(idx<steps.length-1)setIdx(i=>i+1)}
  function prev(){if(idx>0)setIdx(i=>i-1)}
  function next(){if(idx<steps.length-1)setIdx(i=>i+1)}

  return(<Modal fullscreen onClose={onClose}>
    {/* Header */}
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"calc(14px + env(safe-area-inset-top)) 16px 14px",borderBottom:`1px solid ${T.border}`,position:"sticky",top:0,background:T.bg1,zIndex:10}}>
      <button onClick={onClose} style={{background:"none",border:"none",color:T.text2,cursor:"pointer",fontSize:22,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:10,color:T.text3,letterSpacing:"0.12em",textTransform:"uppercase"}}>Painting Mode</div>
        <div style={{fontWeight:900,fontSize:15,color:T.text}}>{recipe.name}</div>
      </div>
      <div style={{fontSize:12,color:T.text3,fontWeight:700}}>{idx+1}/{steps.length}</div>
    </div>

    {/* Progress dots */}
    <div style={{display:"flex",gap:4,padding:"12px 16px 0",justifyContent:"center"}}>
      {steps.map((_,i)=><div key={i} onClick={()=>setIdx(i)} style={{width:i===idx?24:8,height:8,borderRadius:4,background:done.has(i)?T.green:i===idx?T.accent:T.border,transition:"all 0.2s",cursor:"pointer"}}/>)}
    </div>

    {/* Step content */}
    <div style={{padding:"20px 16px",flex:1,maxWidth:500,margin:"0 auto",width:"100%"}}>
      {/* Step number + phase */}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <div style={{width:48,height:48,borderRadius:12,background:col+"20",border:`2px solid ${col}60`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:900,color:col,flexShrink:0}}>{idx+1}</div>
        <div>
          <div style={{fontSize:11,color:T.text3,letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:700}}>Step {idx+1}</div>
          <div style={{fontSize:22,fontWeight:900,color:T.text,lineHeight:1.1}}>{step.phase}</div>
        </div>
        {done.has(idx)&&<div style={{marginLeft:"auto",fontSize:22}}>✅</div>}
      </div>

      {/* Paint info card */}
      <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:"18px",marginBottom:16,textAlign:"center"}}>
        <div style={{fontSize:24,marginBottom:8}}>🎨</div>
        <div style={{fontSize:22,fontWeight:900,color:T.text,marginBottom:6}}>{step.paint||<em style={{color:T.text3,fontSize:16}}>No paint specified</em>}</div>
        {(step.brand||step.type)&&<div style={{fontSize:13,color:T.text3}}>{[step.brand,step.type].filter(Boolean).join(" — ")}</div>}
        {selectedPaint&&<div style={{marginTop:8,fontSize:12,fontWeight:700,color:selectedPaint.owned?T.green:T.red}}>{selectedPaint.owned?"✓ You own this paint":"✗ You need to buy this paint"}</div>}
      </div>

      {/* Notes */}
      {step.notes&&<div style={{background:T.yellow+"14",border:`1px solid ${T.yellow}30`,borderRadius:8,padding:"12px 14px",marginBottom:16,fontSize:13,color:T.text2,lineHeight:1.6}}>💡 {step.notes}</div>}

      {/* Actions */}
      {allDone
        ? <div style={{textAlign:"center",padding:"20px 0"}}><div style={{fontSize:36,marginBottom:12}}>🎉</div><div style={{fontSize:18,fontWeight:900,color:T.green,marginBottom:8}}>Recipe Complete!</div><div style={{fontSize:13,color:T.text3,marginBottom:20}}>All {steps.length} steps done.</div><Btn onClick={onClose} sx={{width:"100%"}}>Done</Btn></div>
        : <button onClick={markDone} style={{width:"100%",background:done.has(idx)?T.bg2:T.accent,color:done.has(idx)?T.text2:"#fff",border:`1px solid ${done.has(idx)?T.border:"transparent"}`,borderRadius:10,padding:"16px",fontSize:16,fontWeight:900,cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s"}}>
            {done.has(idx)?"✓ Done — tap to re-mark":"✓ Step Complete"}
          </button>
      }
    </div>

    {/* Prev / Next */}
    <div style={{display:"flex",gap:8,padding:"16px",borderTop:`1px solid ${T.border}`,paddingBottom:"calc(16px + env(safe-area-inset-bottom))"}}>
      <Btn v="sec" onClick={prev} sx={{flex:1,opacity:idx===0?0.4:1}} disabled={idx===0}>← Prev</Btn>
      <Btn v="sec" onClick={next} sx={{flex:1,opacity:idx===steps.length-1?0.4:1}} disabled={idx===steps.length-1}>Next →</Btn>
    </div>
  </Modal>);
}

function UnitCard({unit,onEdit,onDelete,onStatusChange,onSplit}){

  function startPress(e){e.preventDefault();timerRef.current=setTimeout(()=>{setPressing(false);onSplit(unit)},600);setPressing(true)}

          </div>)}

        {unit.notes&&<div style={{marginTop:7,fontSize:12,color:T.text2,lineHeight:1.55,borderLeft:`2px solid ${T.border}`,paddingLeft:8,whiteSpace:"pre-wrap"}}>{unit.notes}</div>}

// ── Split unit modal ──────────────────────────────────────────────────────────
function SplitModal({unit,onSave,onClose}){
  const [splitCount,setSplitCount]=useState(Math.floor(unit.models/2));
  const [splitStatus,setSplitStatus]=useState("painted");
  const remaining=unit.models-splitCount;
  function save(){
    if(splitCount<1||splitCount>=unit.models)return;
    const existing=unit.subgroups||[];
    const newSg=[...existing,{models:splitCount,status:splitStatus},{models:remaining,status:unit.status}];
    onSave({...unit,subgroups:newSg});
    onClose();
  }
  return(<Modal title={`Split: ${unit.name}`} onClose={onClose}>
    <div style={{background:T.bg2,borderRadius:8,padding:"12px",marginBottom:14,fontSize:13,color:T.text2,lineHeight:1.6}}>Split this unit into two sub-groups with different statuses — useful when only some models are painted.</div>
    <Inp label={`Models in first group (of ${unit.models})`} type="number" min={1} max={unit.models-1} value={splitCount} onChange={e=>setSplitCount(Math.max(1,Math.min(unit.models-1,parseInt(e.target.value)||1)))}/>
    <Sel label="Status for first group" value={splitStatus} onChange={e=>setSplitStatus(e.target.value)}>{Object.entries(SC).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}</Sel>
    <div style={{background:T.bg2,borderRadius:8,padding:"10px 12px",marginBottom:14,fontSize:13}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:T.text2}}>Group 1:</span><span style={{fontWeight:700,color:SC[splitStatus].color}}>{splitCount}× {SC[splitStatus].label}</span></div>
      <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:T.text2}}>Group 2:</span><span style={{fontWeight:700,color:SC[unit.status].color}}>{remaining}× {SC[unit.status].label}</span></div>
    </div>
    <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn v="sec" sm onClick={onClose}>Cancel</Btn><Btn sm onClick={save}>Split Unit</Btn></div>
  </Modal>);
}

// ── Donut chart ───────────────────────────────────────────────────────────────
function Donut({stats,size=120}){
  const r=44,cx=60,cy=60,circ=2*Math.PI*r;
  if(!stats.total)return<div style={{width:size,height:size,borderRadius:"50%",background:T.bg2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:T.text3}}>Empty</div>;
  let off=0;const slices=Object.entries(SC).filter(([k])=>stats[k]>0).map(([k,c])=>{const d=stats[k]/stats.total*circ;const s={key:k,color:c.color,dash:d,off};off+=d;return s});
  return(<svg width={size} height={size} viewBox="0 0 120 120"><circle cx={cx} cy={cy} r={r} fill="none" stroke={T.bg2} strokeWidth="16"/>{slices.map(s=><circle key={s.key} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth="16" strokeDasharray={`${s.dash} ${circ-s.dash}`} strokeDashoffset={-s.off+circ/4}/>)}<text x={cx} y={cy-5} textAnchor="middle" fill={T.text} fontSize="18" fontWeight="900" fontFamily="inherit">{stats.total}</text><text x={cx} y={cy+12} textAnchor="middle" fill={T.text3} fontSize="9" fontFamily="inherit" letterSpacing="0.1em">MODELS</text></svg>);
}

// ── Monthly activity chart ────────────────────────────────────────────────────
const MONTH_NAMES=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function ActivityChart({log}){
  // Always reflects the last 6 *calendar* months, recomputed from the full log
  // history each render — entries keep their real dates, so past months stay
  // accurate even as new updates are logged.
  const months=useMemo(()=>{
    const now=new Date();
    const counts={};
    const order=[];
    for(let i=5;i>=0;i--){
      const d=new Date(now.getFullYear(),now.getMonth()-i,1);
      const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      counts[key]=0;
      order.push({key,label:MONTH_NAMES[d.getMonth()]});
    }
    log.filter(e=>e.toStatus==="painted").forEach(e=>{
      const k=e.date.slice(0,7);
      if(counts[k]!==undefined)counts[k]+=e.count;
    });
    return order.map(({key,label})=>({label,count:counts[key]}));
  },[log]);
  const max=Math.max(...months.map(m=>m.count),1);
  return(<div style={{background:T.bg1,border:`1px solid ${T.border}`,borderRadius:10,padding:"14px 15px",marginBottom:14}}>
    <div style={{fontSize:11,color:T.text3,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12,fontWeight:700}}>Models Painted — Last 6 Months</div>
    <div style={{display:"flex",gap:6,alignItems:"flex-end",height:60}}>
      {months.map(({label,count})=><div key={label} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
        <div style={{fontSize:9,color:T.text3,fontWeight:700}}>{count||""}</div>
        <div style={{width:"100%",background:count>0?T.accent:T.bg2,borderRadius:3,height:`${Math.max(4,(count/max)*44)}px`,transition:"height 0.4s"}}/>
        <div style={{fontSize:9,color:T.text3}}>{label}</div>
      </div>)}
    </div>
    {months.every(m=>m.count===0)&&<div style={{textAlign:"center",fontSize:12,color:T.text3,marginTop:8}}>No models marked painted yet — update unit statuses to track progress!</div>}
  </div>);
}

// ── HOBBY BLOCKER ─────────────────────────────────────────────────────────────
// Randomly assigns one in-progress project as "today's pick" to encourage
// focused work. The pick is stored with today's date so it stays consistent
// if you reopen the app, but a Reroll button lets you pick again.
function todayKey(){return new Date().toISOString().slice(0,10)}

function pickRandomProject(projects,excludeId){
  const candidates=projects.filter(p=>{
    const s=getStats(p);
    if(!s.total)return false;
    const pct=Math.round(s.painted/s.total*100);
    return pct>0&&pct<100&&p.id!==excludeId;
  });
  if(!candidates.length){
    // fall back to any project with models that isn't 100% done
    const fallback=projects.filter(p=>{const s=getStats(p);return s.total>0&&s.painted<s.total&&p.id!==excludeId});
    if(!fallback.length)return null;
    return fallback[Math.floor(Math.random()*fallback.length)];
  }
  return candidates[Math.floor(Math.random()*candidates.length)];
}

function HobbyBlocker({data,onGoToProject}){
  const [pick,setPick]=useState(()=>lsLoad(SK_HOBBY,null));

  // Auto-pick if no pick exists for today
  useEffect(()=>{
    if(pick&&pick.date===todayKey()&&data.projects.some(p=>p.id===pick.projectId))return;
    const chosen=pickRandomProject(data.projects,null);
    if(chosen){
      const np={date:todayKey(),projectId:chosen.id};
      lsSave(SK_HOBBY,np);setPick(np);
    } else if(pick){
      lsSave(SK_HOBBY,null);setPick(null);
    }
  },[data.projects.length]);

  function reroll(){
    const chosen=pickRandomProject(data.projects,pick?.projectId);
    if(chosen){
      const np={date:todayKey(),projectId:chosen.id};
      lsSave(SK_HOBBY,np);setPick(np);
    }
  }

  const project=pick?data.projects.find(p=>p.id===pick.projectId):null;
  const eligibleCount=data.projects.filter(p=>{const s=getStats(p);return s.total>0&&s.painted<s.total}).length;

  if(eligibleCount===0)return null;

  const s=project?getStats(project):null;
  const pct=s&&s.total?Math.round(s.painted/s.total*100):0;

  return(<div style={{background:`linear-gradient(135deg, ${T.accentDim}, ${T.bg1})`,border:`1px solid ${T.accent}40`,borderRadius:10,padding:"14px 15px",marginBottom:14}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div style={{fontSize:11,color:T.accent,letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:900}}>🎲 Hobby Blocker — Today's Pick</div>
      <button onClick={reroll} title="Pick a different project" style={{background:"none",border:`1px solid ${T.border}`,borderRadius:6,padding:"4px 9px",fontSize:11,color:T.text2,cursor:"pointer",fontFamily:"inherit"}}>🔁 Reroll</button>
    </div>
    {project?<>
      <div onClick={()=>onGoToProject(project.id)} style={{cursor:"pointer"}}>
        <div style={{fontSize:17,fontWeight:900,color:T.text,marginBottom:2}}>{project.name}</div>
        {project.faction&&<div style={{fontSize:11,color:T.text3,marginBottom:8}}>{project.faction}</div>}
        <Bar stats={s}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:12,color:T.text2}}>
          <span>{s.painted}/{s.total} painted ({pct}%)</span>
          <span style={{color:T.accent,fontWeight:700}}>Open →</span>
        </div>
      </div>
    </>:<div style={{fontSize:13,color:T.text3,textAlign:"center",padding:"10px 0"}}>No in-progress projects to suggest.</div>}
  </div>);
}

  if(p){const s=getStats(p);return(<div style={{minHeight:"100dvh",background:T.bg0,color:T.text,fontFamily:"'Courier New','Lucida Console',monospace"}}>{banner}<div style={{borderBottom:`1px solid ${T.border}`,padding:"12px 15px",display:"flex",alignItems:"center",gap:10,background:T.bg0,position:"sticky",top:0,zIndex:50}}><button onClick={()=>{setIdx(null);setTab("units")}} style={{background:"none",border:"none",color:T.text2,cursor:"pointer",fontSize:22,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button><div style={{flex:1,minWidth:0}}>{p.faction&&<div style={{fontSize:10,color:T.text3,letterSpacing:"0.15em",textTransform:"uppercase"}}>{p.faction}</div>}<h1 style={{margin:0,fontSize:16,fontWeight:900,color:T.accent,letterSpacing:"0.07em",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</h1></div></div><div style={{padding:"12px 15px 40px",maxWidth:680,margin:"0 auto"}}><div style={{background:T.bg1,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",marginBottom:13,marginTop:6}}><div style={{fontSize:10,color:T.text3,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:5,fontWeight:700}}>{s.total} models · {p.units.length} units · {(p.recipes||[]).length} recipes</div><Bar stats={s}/><div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:6}}>{Object.entries(SC).map(([k,c])=><div key={k} style={{fontSize:11}}><span style={{color:T.text3}}>{c.label} </span><span style={{color:c.color,fontWeight:700}}>{s[k]}</span></div>)}</div></div><TabBar tabs={[{id:"units",label:`Units (${p.units.length})`},{id:"recipes",label:`Recipes (${(p.recipes||[]).length})`},{id:"showcase",label:"Showcase"}]} active={tab} onChange={setTab}/>{tab==="units"&&p.units.map(u=>(<div key={u.id} style={{background:T.bg1,border:`1px solid ${T.border}`,borderRadius:10,padding:"13px 14px",marginBottom:9}}><div style={{display:"flex",gap:10,alignItems:"flex-start"}}>{u.photo&&<img src={u.photo} alt="" style={{width:60,height:60,objectFit:"cover",borderRadius:8,border:`1px solid ${T.border}`,flexShrink:0}}/>}<div style={{flex:1,minWidth:0}}><div style={{fontWeight:800,fontSize:14,color:T.text,marginBottom:5}}>{u.name}</div><div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><Badge status={u.status}/><span style={{fontSize:13,color:T.text2}}><span style={{color:T.accent,fontWeight:700}}>{u.models}</span> model{u.models!==1?"s":""}</span></div>{u.notes&&<div style={{marginTop:7,fontSize:12,color:T.text2,lineHeight:1.55,borderLeft:`2px solid ${T.border}`,paddingLeft:8,whiteSpace:"pre-wrap"}}>{u.notes}</div>}</div></div></div>))}{tab==="recipes"&&(p.recipes||[]).map(r=><RecipeCard key={r.id} recipe={r} readOnly onEdit={()=>{}} onDelete={()=>{}} onStartPainting={()=>{}}/>)}{tab==="showcase"&&(<div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{p.units.filter(u=>u.photo).map(u=>(<div key={u.id} style={{borderRadius:8,overflow:"hidden",position:"relative"}}><img src={u.photo} alt={u.name} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}}/><div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.7)",padding:"20px 8px 6px"}}><div style={{fontSize:11,fontWeight:700,color:"#fff"}}>{u.name}</div><div style={{marginTop:2}}><Badge status={u.status}/></div></div></div>))}</div>{p.units.filter(u=>u.photo).length===0&&<div style={{textAlign:"center",color:T.text3,padding:"40px 0",fontSize:13}}>No photos in this project.</div>}</div>)}</div></div>);}
  return(<div style={{minHeight:"100dvh",background:T.bg0,color:T.text,fontFamily:"'Courier New','Lucida Console',monospace"}}>{banner}<div style={{borderBottom:`1px solid ${T.border}`,padding:"14px 15px",background:T.bg0,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><h1 style={{margin:0,fontSize:16,fontWeight:900,color:T.accent,letterSpacing:"0.07em"}}>🎨 TABLETOP READY</h1><div style={{fontSize:11,color:T.text3,marginTop:3}}>Shared — {projects.length} project{projects.length!==1?"s":""}</div></div></div>
  <div style={{padding:"12px 15px 40px",maxWidth:680,margin:"0 auto"}}>
    {onAddToCollection&&<div style={{background:T.green+"14",border:`1px solid ${T.green}35`,borderRadius:8,padding:"10px 13px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:T.green}}>Want to add these to your collection?</span><Btn sm v="ok" onClick={()=>onAddToCollection(projects)}>+ Add to Mine</Btn></div>}
    {projects.map((p,i)=>{const s=getStats(p);return(<div key={i} onClick={()=>setIdx(i)} style={{background:T.bg1,border:`1px solid ${T.border}`,borderRadius:10,padding:"14px 15px",marginBottom:10,cursor:"pointer"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontWeight:800,fontSize:15,color:T.text}}>{p.name}</div>{p.faction&&<div style={{fontSize:11,color:T.text3,marginTop:2}}>{p.faction}</div>}</div><div style={{textAlign:"right"}}><div style={{fontWeight:700,color:T.accent,fontSize:22,lineHeight:1}}>{s.total}</div><div style={{fontSize:10,color:T.text3}}>models</div></div></div><Bar stats={s}/><div style={{marginTop:7,fontSize:11,color:T.text3}}>{p.units.length} units · {(p.recipes||[]).length} recipes → tap to view</div></div>)})}
  </div></div>);
}

// ══════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════════════════
function App(){
  const {session,signIn,signOut}=useAuth();
  const [skipLogin,setSkipLogin]=useState(()=>lsLoad("cq-skip-login",false));
  const [data,setData]=useState(()=>lsLoad(SK_DATA,DEFAULT_DATA));
  const {paints,addPaint,delPaint,toggleOwned,setPaints}=usePaints();
  const {log,addEntry,setLog}=usePaintLog();
  const [syncStatus,setSyncStatus]=useState("idle"); // idle|syncing|synced|error
  const [syncError,setSyncError]=useState(null);
  const [cloudLoaded,setCloudLoaded]=useState(false);
  const [screen,setScreen]=useState("dashboard");
  const [activePid,setActivePid]=useState(null);
  const [tab,setTab]=useState("units");
  const [modal,setModal]=useState(null);
  const [recipeModal,setRecipeModal]=useState(null);
  const [paintingRecipe,setPaintingRecipe]=useState(null);
  const [shareTarget,setShareTarget]=useState(null);
  const [splitTarget,setSplitTarget]=useState(null);
  const [editTarget,setEditTarget]=useState(null);
  const [form,setForm]=useState({});
  const [filterStatus,setFilter]=useState("all");
  const [search,setSearch]=useState("");
  const [toast,setToast]=useState(null);
  const [showBackupBanner,setShowBackupBanner]=useState(false);

  useEffect(()=>{lsSave(SK_DATA,data)},[data]);

  // Backup reminder: check if 7+ days since last backup
  useEffect(()=>{
    const last=lsLoad(SK_BACKUP,null);
    if(!last)return;
    const days=(Date.now()-new Date(last).getTime())/(1000*60*60*24);
    if(days>=7)setShowBackupBanner(true);
  },[]);

  // ── CLOUD SYNC: on login, pull cloud data (merge if local has more) ──────────
  useEffect(()=>{
    if(!session?.token||cloudLoaded)return;
    (async()=>{
      setSyncStatus("syncing");
      const {data:cloud,error}=await cloudLoad(session.token);
      if(error){setSyncError(error);setSyncStatus("error");setCloudLoaded(true);return}
      if(cloud){
        if(cloud.projects&&cloud.projects.length>0){setData({projects:cloud.projects})}
        if(cloud.paints&&cloud.paints.length>0){setPaints(cloud.paints)}
        if(cloud.log&&cloud.log.length>0){setLog(cloud.log)}
      } else {
        const r=await cloudSave(session.token,{projects:data.projects,paints,log});
        if(!r.ok){setSyncError(r.error);setSyncStatus("error");setCloudLoaded(true);return}
      }
      setSyncError(null);
      setCloudLoaded(true);
      setSyncStatus("synced");
    })();
  },[session,cloudLoaded]);

  // ── CLOUD SYNC: debounced push on any change, once initial load is done ──────
  useEffect(()=>{
    if(!session?.token||!cloudLoaded)return;
    setSyncStatus("syncing");
    const t=setTimeout(async()=>{
      const r=await cloudSave(session.token,{projects:data.projects,paints,log});
      if(r.ok){setSyncError(null);setSyncStatus("synced")}else{setSyncError(r.error);setSyncStatus("error")}
    },1200);
    return ()=>clearTimeout(t);
  },[data,paints,log,session,cloudLoaded]);

  const showToast=(msg,color=T.green)=>{setToast({msg,color});setTimeout(()=>setToast(null),2600)};
  const nid=()=>Date.now()+Math.floor(Math.random()*999);
  const close=()=>{setModal(null);setForm({});setEditTarget(null)};
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const mut=fn=>setData(d=>({projects:fn(d.projects)}));

  const addProject=()=>{if(!form.name?.trim())return;mut(ps=>[...ps,{id:nid(),name:form.name.trim(),faction:form.faction?.trim()||"",units:[],recipes:[]}]);close()};
  const saveProject=()=>{mut(ps=>ps.map(p=>p.id===editTarget?{...p,name:form.name?.trim()||p.name,faction:form.faction?.trim()??p.faction}:p));close()};
  const delProject=id=>{mut(ps=>ps.filter(p=>p.id!==id));setScreen("projects")};
  const addUnit=()=>{if(!form.name?.trim())return;const u={id:nid(),name:form.name.trim(),models:parseInt(form.models)||1,status:form.status||"new_in_box",notes:form.notes||"",photo:form.photo||null,subgroups:null};mut(ps=>ps.map(p=>p.id===activePid?{...p,units:[...p.units,u]}:p));close()};
  const saveUnit=()=>{mut(ps=>ps.map(p=>p.id===activePid?{...p,units:p.units.map(u=>u.id===editTarget?{...u,name:form.name?.trim()||u.name,models:parseInt(form.models)||u.models,status:form.status||u.status,notes:form.notes??u.notes,photo:form.photo!==undefined?form.photo:u.photo,subgroups:form.subgroups!==undefined?form.subgroups:u.subgroups}:u)}:p));close()};
  const delUnit=id=>mut(ps=>ps.map(p=>p.id===activePid?{...p,units:p.units.filter(u=>u.id!==id)}:p));

  const changeUnitStatus=(uid,newStatus)=>{
    const proj=data.projects.find(p=>p.id===activePid);
    const unit=proj?.units.find(u=>u.id===uid);
    if(unit){addEntry(proj.name,unit.name,unit.models,unit.status,newStatus)}
    mut(ps=>ps.map(p=>p.id===activePid?{...p,units:p.units.map(u=>u.id===uid?{...u,status:newStatus}:u)}:p));
    showToast(`${unit?.name} → ${SC[newStatus].label}`);
  };

  const saveRecipe=recipe=>{
    if(recipeModal?.mode==="add"){const r={...recipe,id:nid()};mut(ps=>ps.map(p=>p.id===activePid?{...p,recipes:[...(p.recipes||[]),r]}:p))}
    else{mut(ps=>ps.map(p=>p.id===activePid?{...p,recipes:(p.recipes||[]).map(r=>r.id===recipe.id?recipe:r)}:p))}
    setRecipeModal(null);
  };
  const delRecipe=id=>mut(ps=>ps.map(p=>p.id===activePid?{...p,recipes:(p.recipes||[]).filter(r=>r.id!==id)}:p));

  const handleImport=(projects,mode)=>{
    const rm=projects.map(p=>({...p,id:nid(),units:(p.units||[]).map(u=>({...u,id:nid()})),recipes:(p.recipes||[]).map(r=>({...r,id:nid()}))}));
    if(mode==="replace"){setData({projects:rm})}else{mut(ps=>[...ps,...rm])}
    showToast(`✓ Imported ${projects.length} project${projects.length!==1?"s":""}`);
  };

  function doBackup(){exportAll(data);lsSave(SK_BACKUP,new Date().toISOString());setShowBackupBanner(false);showToast("✓ Backup saved")}

  const project=data.projects.find(p=>p.id===activePid);
  const filteredUnits=project?.units.filter(u=>(filterStatus==="all"||u.status===filterStatus)&&(!search||u.name.toLowerCase().includes(search.toLowerCase())||(u.notes||"").toLowerCase().includes(search.toLowerCase())))||[];
  const shownProjects=data.projects.filter(p=>!search||p.name.toLowerCase().includes(search.toLowerCase())||(p.faction||"").toLowerCase().includes(search.toLowerCase())||p.units.some(u=>u.name.toLowerCase().includes(search.toLowerCase())));
  const goToProject=pid=>{setActivePid(pid);setScreen("detail");setSearch("");setTab("units")};

  // Auth gate: show login unless signed in or explicitly skipped
  if(session===undefined)return(<div style={{minHeight:"100dvh",background:T.bg0,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:T.accent,fontFamily:"monospace",fontSize:13,letterSpacing:"0.15em"}}>LOADING…</div></div>);
  if(!session&&!skipLogin)return<LoginScreen onSignIn={signIn} onSkip={()=>{lsSave("cq-skip-login",true);setSkipLogin(true)}}/>;

  if(screen==="paints")return<PaintLibrary paints={paints} addPaint={addPaint} delPaint={delPaint} toggleOwned={toggleOwned} onClose={()=>setScreen("projects")}/>;
  if(screen==="account")return<AccountScreen session={session} syncStatus={syncStatus} syncError={syncError} onSignOut={()=>{signOut();setScreen("projects")}} onClose={()=>setScreen("projects")}/>;

  const hdrTitle=screen==="detail"&&project?project.name:"🎨 TABLETOP READY";
  const hdrSub=screen==="detail"&&project?(project.faction||"Project"):null;

  return(<div style={{minHeight:"100dvh",background:T.bg0,color:T.text,fontFamily:"'Courier New','Lucida Console',monospace",display:"flex",flexDirection:"column"}}>

    {toast&&<div style={{position:"fixed",top:"calc(16px + env(safe-area-inset-top))",left:"50%",transform:"translateX(-50%)",background:T.bg1,border:`1px solid ${toast.color}50`,borderRadius:8,padding:"10px 18px",fontSize:13,fontWeight:700,color:toast.color,zIndex:999,boxShadow:"0 8px 32px rgba(0,0,0,0.15)",whiteSpace:"nowrap",pointerEvents:"none"}}>{toast.msg}</div>}

    {/* Header */}
    <div style={{borderBottom:`1px solid ${T.border}`,padding:`calc(14px + env(safe-area-inset-top)) 15px 13px`,display:"flex",alignItems:"center",gap:10,background:T.bg0,flexShrink:0,position:"sticky",top:0,zIndex:50}}>
      {screen==="detail"&&<button onClick={()=>{setScreen("projects");setActivePid(null);setFilter("all");setSearch("")}} style={{background:"none",border:"none",color:T.text2,cursor:"pointer",fontSize:22,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>}
      <div style={{flex:1,minWidth:0}}>
        {hdrSub&&<div style={{fontSize:10,color:T.text3,letterSpacing:"0.15em",textTransform:"uppercase"}}>{hdrSub}</div>}
        <h1 style={{margin:0,fontSize:16,fontWeight:900,color:T.accent,letterSpacing:"0.07em",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{hdrTitle}</h1>
      </div>
      <div style={{display:"flex",gap:5,flexShrink:0,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
        {session&&<button onClick={()=>setScreen("account")} title="Account & Sync" style={{background:"none",border:"none",cursor:"pointer",fontSize:16,padding:"4px 6px",display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:"50%",background:syncStatus==="synced"?T.green:syncStatus==="syncing"?T.blue:syncStatus==="error"?T.red:T.text3,display:"inline-block"}}/>👤</button>}
        {screen==="dashboard"&&<Btn sm v="orange" onClick={()=>setModal("shareDashboard")}>🔗 Share</Btn>}
        {(screen==="dashboard"||screen==="projects")&&<Btn sm v="ok" onClick={()=>exportCSV(data)}>↓ CSV</Btn>}
        {screen==="projects"&&<><Btn sm v="blue" onClick={()=>setModal("import")}>↑ Import</Btn><Btn sm v="ok" onClick={doBackup}>↓ All</Btn><Btn sm onClick={()=>{setModal("addProject");setForm({})}}>+ Project</Btn></>}
        {screen==="detail"&&project&&<>
          <Btn sm v="orange" onClick={()=>setShareTarget(project)}>🔗 Share</Btn>
          <Btn sm v="ok" onClick={()=>{exportProject(project);showToast("✓ Exported")}}>↓ Export</Btn>
          <Btn sm v="sec" onClick={()=>{setForm({name:project.name,faction:project.faction});setEditTarget(activePid);setModal("editProject")}}>Edit</Btn>
          {tab==="units"&&<Btn sm onClick={()=>{setModal("addUnit");setForm({status:"new_in_box",models:"1"})}}>+ Unit</Btn>}
          {tab==="recipes"&&<Btn sm onClick={()=>setRecipeModal({recipe:null,mode:"add"})}>+ Recipe</Btn>}
        </>}
      </div>
    </div>

    {/* Backup banner */}
    {showBackupBanner&&screen!=="detail"&&<BackupBanner onExport={doBackup} onDismiss={()=>setShowBackupBanner(false)}/>}

    {/* Search */}
    {(screen==="projects"||screen==="detail")&&<div style={{padding:"10px 15px 0",maxWidth:680,margin:"0 auto",width:"100%",flexShrink:0}}><div style={{position:"relative"}}><span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:T.text3,fontSize:13}}>🔍</span><input value={search} onChange={e=>setSearch(e.target.value)} placeholder={screen==="projects"?"Search projects, factions, units…":"Search units or notes…"} style={{...IS,paddingLeft:32}}/>{search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:T.text3,cursor:"pointer",fontSize:18}}>×</button>}</div></div>}

    {/* Content */}
    <div style={{flex:1,overflowY:"auto"}}>
      {screen==="dashboard"&&<Dashboard data={data} log={log} onGoToProject={goToProject}/>}

      {screen==="projects"&&<div style={{padding:"12px 15px",maxWidth:680,margin:"0 auto",paddingBottom:"calc(80px + env(safe-area-inset-bottom))"}}>
        {(()=>{const g={painted:0,built:0,unpainted:0,new_in_box:0,total:0};data.projects.forEach(p=>{const s=getStats(p);Object.keys(g).forEach(k=>g[k]+=s[k])});return(<div style={{background:T.bg1,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",marginBottom:14,marginTop:6}}><div style={{fontSize:10,color:T.text3,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:7,fontWeight:700}}>Collection — {g.total} models · {data.projects.length} project{data.projects.length!==1?"s":""}</div><Bar stats={g}/><div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:7}}>{Object.entries(SC).map(([k,c])=><div key={k} style={{fontSize:11}}><span style={{color:T.text3}}>{c.label} </span><span style={{color:c.color,fontWeight:700}}>{g[k]}</span></div>)}</div></div>)})()}
        {shownProjects.length===0&&<div style={{textAlign:"center",color:T.text3,padding:"50px 0",fontSize:14}}>{search?"No projects match.":"No projects yet!"}</div>}
        {shownProjects.map(p=>{const s=getStats(p);return(<div key={p.id} onClick={()=>goToProject(p.id)} style={{background:T.bg1,border:`1px solid ${T.border}`,borderRadius:10,padding:"14px 15px",marginBottom:10,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontWeight:800,fontSize:15,color:T.text}}>{p.name}</div>{p.faction&&<div style={{fontSize:11,color:T.text3,marginTop:2}}>{p.faction}</div>}</div><div style={{textAlign:"right"}}><div style={{fontWeight:700,color:T.accent,fontSize:22,lineHeight:1}}>{s.total}</div><div style={{fontSize:10,color:T.text3}}>models</div></div></div>
          <Bar stats={s}/><div style={{display:"flex",gap:9,flexWrap:"wrap",marginTop:5}}>{Object.entries(SC).map(([k,c])=>s[k]>0&&<span key={k} style={{fontSize:11,color:c.color}}>{c.icon} {s[k]} {c.label}</span>)}</div>
          <div style={{marginTop:7,fontSize:11,color:T.text3}}>{p.units.length} unit{p.units.length!==1?"s":""} · {(p.recipes||[]).length} recipe{(p.recipes||[]).length!==1?"s":""} → tap to open</div>
        </div>)})}
      </div>}

      {screen==="detail"&&project&&<div style={{padding:"12px 15px",maxWidth:680,margin:"0 auto",paddingBottom:"calc(80px + env(safe-area-inset-bottom))"}}>
        {(()=>{const s=getStats(project);return(<div style={{background:T.bg1,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",marginBottom:13,marginTop:6}}><div style={{fontSize:10,color:T.text3,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:5,fontWeight:700}}>{s.total} models · {project.units.length} units · {(project.recipes||[]).length} recipes</div><Bar stats={s}/><div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:6}}>{Object.entries(SC).map(([k,c])=><div key={k} style={{fontSize:11}}><span style={{color:T.text3}}>{c.label} </span><span style={{color:c.color,fontWeight:700}}>{s[k]}</span></div>)}</div></div>)})()}
        <TabBar tabs={[{id:"units",label:`Units (${project.units.length})`},{id:"recipes",label:`Recipes (${(project.recipes||[]).length})`},{id:"showcase",label:"Showcase"}]} active={tab} onChange={setTab}/>

        {tab==="units"&&<>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>{[["all","All"],...Object.entries(SC).map(([k,v])=>[k,v.label])].map(([k,label])=>(<button key={k} onClick={()=>setFilter(k)} style={{background:filterStatus===k?T.accentDim:"transparent",border:`1px solid ${filterStatus===k?T.accent:T.border}`,borderRadius:20,padding:"4px 11px",cursor:"pointer",color:filterStatus===k?T.accent:T.text3,fontSize:11,fontWeight:700,letterSpacing:"0.04em",textTransform:"uppercase",fontFamily:"inherit"}}>{label}</button>))}</div>
          <div style={{fontSize:11,color:T.text3,marginBottom:10,paddingLeft:2}}>Tap a status badge to cycle · Hold to split unit</div>
          {filteredUnits.length===0&&<div style={{textAlign:"center",color:T.text3,padding:"40px 0",fontSize:14}}>{project.units.length===0?"No units yet.":"No units match."}</div>}
          {filteredUnits.map(u=><UnitCard key={u.id} unit={u} onEdit={u=>{setEditTarget(u.id);setForm({name:u.name,models:String(u.models),status:u.status,notes:u.notes||"",photo:u.photo||null,subgroups:u.subgroups});setModal("editUnit")}} onDelete={delUnit} onStatusChange={changeUnitStatus} onSplit={u=>setSplitTarget(u)}/>)}
        </>}

        {tab==="recipes"&&<>
          {(project.recipes||[]).length===0&&<div style={{textAlign:"center",color:T.text3,padding:"40px 0",fontSize:14}}>No paint recipes yet.<br/>Tap + Recipe to add your first.</div>}
          {(project.recipes||[]).map(r=><RecipeCard key={r.id} recipe={r} onEdit={r=>setRecipeModal({recipe:r,mode:"edit"})} onDelete={delRecipe} onStartPainting={r=>setPaintingRecipe(r)}/>)}
        </>}

        {tab==="showcase"&&<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {project.units.filter(u=>u.photo).map(u=>(<div key={u.id} style={{borderRadius:10,overflow:"hidden",position:"relative",border:`1px solid ${T.border}`}}><img src={u.photo} alt={u.name} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}}/><div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.75))",padding:"24px 10px 8px"}}><div style={{fontSize:12,fontWeight:800,color:"#fff"}}>{u.name}</div><div style={{marginTop:3}}><Badge status={u.status}/></div></div></div>))}
          </div>
          {project.units.filter(u=>u.photo).length===0&&<div style={{textAlign:"center",color:T.text3,padding:"50px 0",fontSize:13}}>No photos yet — add photos to units to see them here.</div>}
        </>}

        <div style={{marginTop:28,borderTop:`1px solid ${T.border}`,paddingTop:14}}><Btn v="del" sm onClick={()=>{if(window.confirm("Delete this project and all its data?"))delProject(project.id)}}>🗑 Delete Project</Btn></div>
      </div>}
    </div>

    {/* Bottom Nav */}
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:T.bg0,borderTop:`1px solid ${T.border}`,display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom)"}}>
      {[{id:"dashboard",icon:"📊",label:"Dashboard"},{id:"projects",icon:"⚔️",label:"Projects"},{id:"paints",icon:"🎨",label:"Paints"}].map(({id,icon,label})=>{
        const active=screen===id||(screen==="detail"&&id==="projects");
        return(<button key={id} onClick={()=>{if(id==="projects"&&screen==="detail"){setScreen("projects");setActivePid(null);setFilter("all");setSearch("")}else{setScreen(id)}}} style={{flex:1,padding:"10px 8px 9px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,WebkitTapHighlightColor:"transparent",opacity:active?1:0.45}}>
          <span style={{fontSize:19}}>{icon}</span>
          <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",color:active?T.accent:T.text3,fontFamily:"inherit"}}>{label}</span>
          {active&&<div style={{width:18,height:2,borderRadius:1,background:T.accent,marginTop:1}}/>}
        </button>);
      })}
    </div>

    {/* Modals & Overlays */}
    {paintingRecipe&&<PaintingMode recipe={paintingRecipe} onClose={()=>setPaintingRecipe(null)} paints={paints}/>}
    {shareTarget&&<ShareModal project={shareTarget} onClose={()=>setShareTarget(null)}/>}
    {modal==="shareDashboard"&&<ShareDashboardModal data={data} onClose={close}/>}
    {splitTarget&&<SplitModal unit={splitTarget} onSave={u=>{setEditTarget(u.id);mut(ps=>ps.map(p=>p.id===activePid?{...p,units:p.units.map(x=>x.id===u.id?u:x)}:p))}} onClose={()=>setSplitTarget(null)}/>}
    {modal==="import"&&<ImportModal onClose={close} onImport={handleImport}/>}
    {modal==="addProject"&&<Modal title="New Project" onClose={close}><Inp label="Project Name" placeholder="e.g. Orks Waaagh!" value={form.name||""} onChange={e=>sf("name",e.target.value)} autoFocus/><Inp label="Faction / Army" placeholder="e.g. Orks, Space Marines…" value={form.faction||""} onChange={e=>sf("faction",e.target.value)}/><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}><Btn v="sec" sm onClick={close}>Cancel</Btn><Btn sm onClick={addProject}>Create</Btn></div></Modal>}
    {modal==="editProject"&&<Modal title="Edit Project" onClose={close}><Inp label="Project Name" value={form.name||""} onChange={e=>sf("name",e.target.value)} autoFocus/><Inp label="Faction / Army" value={form.faction||""} onChange={e=>sf("faction",e.target.value)}/><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}><Btn v="sec" sm onClick={close}>Cancel</Btn><Btn sm onClick={saveProject}>Save</Btn></div></Modal>}
    {(modal==="addUnit"||modal==="editUnit")&&<Modal title={modal==="addUnit"?"Add Unit":"Edit Unit"} onClose={close} wide><Inp label="Unit Name" placeholder="e.g. Boyz Squad, Terminators…" value={form.name||""} onChange={e=>sf("name",e.target.value)} autoFocus/><Inp label="Number of Models" type="number" min="1" value={form.models||"1"} onChange={e=>sf("models",e.target.value)}/><Sel label="Status" value={form.status||"new_in_box"} onChange={e=>sf("status",e.target.value)}>{Object.entries(SC).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}</Sel><Txt label="Notes" placeholder="Assembly notes, colour cues, WIP ideas…" value={form.notes||""} onChange={e=>sf("notes",e.target.value)}/><PhotoUpload value={form.photo||null} onChange={v=>sf("photo",v)}/><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:6}}><Btn v="sec" sm onClick={close}>Cancel</Btn><Btn sm onClick={modal==="addUnit"?addUnit:saveUnit}>{modal==="addUnit"?"Add Unit":"Save"}</Btn></div></Modal>}
    {recipeModal&&<RecipeModal recipe={recipeModal.recipe} onSave={saveRecipe} onClose={()=>setRecipeModal(null)} paints={paints} addPaint={addPaint}/>}
  </div>);
}

function Root(){
  const hash=window.location.hash;
  if(hash.startsWith("#dashboard=")){const d=decodeDashboardShare(hash);if(d)return<SharedDashboard payload={d}/>}
  if(hash.startsWith("#share=")){const p=decodeShare(hash);if(p)return<SharedView projects={p} onAddToCollection={null}/>}
  return<App/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
